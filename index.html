<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do</title>

  <!-- PWA (모두 상대경로) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5B6CFF" />
  <link rel="icon" href="icons/icon-192.png" />
  <!-- iOS 사파리 대응 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="To Do List" />
  <meta name="mobile-web-app-capable" content="yes" />

  <style>
    /* ===== 디자인 토큰 ===== */
    :root {
      /* 배경 */
      --bg: #FFFFFF;
      --bg-soft: #FAFBFD;

      /* 잉크(텍스트) */
      --ink: #1F2433;
      --ink-2: #5B6478;
      --ink-3: #9AA2B4;

      /* 강조 */
      --accent: #5B6CFF;

      /* 보더 / 그림자 */
      --line: #EDF0F5;
      --shadow: 0 1px 2px rgba(31, 36, 51, 0.04), 0 8px 24px rgba(31, 36, 51, 0.05);

      /* 라운드 */
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;

      /* 간격 */
      --gap: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;       /* 가로 스크롤(삐져나감) 방지 */
      max-width: 100%;
    }

    body {
      background: var(--bg-soft);
      color: var(--ink);
      /* 한글 가독성: 시스템 한글 폰트 폴백 + 넉넉한 줄간 */
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
                   "Malgun Gothic", "맑은 고딕", system-ui, -apple-system,
                   "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* ===== 레이아웃 골격 ===== */
    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* 상단 바 */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px 22px;
    }

    .search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      color: var(--ink-3);
      font-size: 14px;
    }

    .search input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    .search input::placeholder { color: var(--ink-3); }

    /* 상단바 좌측: 브랜드 + 카테고리 범례 + 관리 */
    .topbar-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .cat-legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    /* 카테고리 칩: 배경 = 각 카테고리 색(인라인), 글자는 진한 톤 */
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      background: var(--bg-soft);
      border: 1px solid rgba(31, 36, 51, 0.06);
      border-radius: 999px;
      padding: 3px 12px;
    }
    /* 'Category' 라벨: 그룹 제목(.column-head h2)과 동일한 크기·색·굵기 */
    .legend-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }
    /* 칩(카테고리 항목)과 관리(동작) 버튼 사이 구분선 */
    .legend-sep {
      width: 1px;
      align-self: stretch;
      min-height: 18px;
      background: var(--line);
      margin: 0 2px 0 6px;
    }
    /* [관리] 버튼: 카테고리 칩과 동일 크기(.btn 기본값을 이기도록 특이도 ↑) */
    .btn.manage-btn { font-size: 12px; font-weight: 600; padding: 3px 10px; margin-left: 4px; }

    /* 달력 중앙 정렬 */
    .calendar-center {
      display: flex;
      justify-content: center;
    }
    .cal-panel {
      width: 460px;
      max-width: 100%;
    }

    .panel {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    /* 보드: 세로 스택(할 일 → 진행중 → 완료) */
    .board {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .column {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .column-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .column-head .head-spacer { flex: 1; }
    /* [+ 추가] 버튼: 카테고리 칩과 동일 크기(.btn 기본값을 이기도록 특이도 ↑) */
    .btn.add-task-btn { font-size: 12px; font-weight: 600; padding: 3px 10px; }

    .column-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .column-head .count {
      font-size: 12px;
      color: var(--ink-3);
      background: var(--bg-soft);
      border-radius: 999px;
      padding: 1px 9px;
    }

    /* 그룹 제목 앞 아이콘(이모지) */
    .group-icon {
      font-size: 15px;
      line-height: 1;
    }

    /* ===== 입력 필드 ===== */
    .field {
      font: inherit;
      color: var(--ink);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      outline: 0;
    }
    .field::placeholder { color: var(--ink-3); }
    .field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 108, 255, 0.12);
    }
    .field.invalid {
      border-color: #FFB4C4;
      box-shadow: 0 0 0 3px rgba(255, 180, 196, 0.25);
    }

    select.field { cursor: pointer; }

    .btn {
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      padding: 9px 16px;
      transition: filter .12s ease, background .12s ease;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost {
      background: var(--bg-soft);
      color: var(--ink-2);
      border-color: var(--line);
    }
    .btn-ghost:hover { background: #F1F3F8; }

    /* ===== 카드 목록 ===== */
    .card-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 전폭 한 줄 카드: [번호] [컨트롤] [제목+상세] [수정/삭제] — 세로 중앙 정렬 통일 */
    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      box-shadow: 0 1px 2px rgba(31, 36, 51, 0.04);
      transition: box-shadow .12s ease, opacity .12s ease;
      cursor: grab;
      touch-action: none; /* 터치 드래그 시 스크롤 가로채기 방지 */
    }
    .card:hover { box-shadow: var(--shadow); }
    .card:active { cursor: grabbing; }

    /* 좌측: 상태 컨트롤(완료/진행중) */
    .card-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }
    .card-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* 그룹 내 순서 번호(각 그룹 1부터) — 약 2배 크기, 옅은 회색 */
    .card-no {
      font-size: 24px;
      font-weight: 700;
      color: var(--ink-3);
      min-width: 1.4em;
      text-align: right;
      flex: 0 0 auto;
      align-self: center;
      line-height: 1.1;
    }

    /* 가운데: 제목 + 상세(말줄임 금지, 줄바꿈 허용) */
    .card-main { flex: 1 1 auto; min-width: 0; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }
    .card-memo {
      font-size: 12.5px;
      color: var(--ink-2);
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 완료 카드: 취소선 + 흐림 */
    .card.is-done { opacity: 0.55; background: var(--bg-soft); }
    .card.is-done .card-title { text-decoration: line-through; color: var(--ink-3); }
    .card.is-done .card-memo { text-decoration: line-through; }

    /* 우측: 수정/삭제(항상 노출) */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .cat-chip {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-2);
      border-radius: 999px;
      padding: 2px 10px;
      white-space: nowrap;
    }

    /* 상태 컨트롤: 연하게 — 시각 우선순위는 제목·내용에 둠 */
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-3);
      cursor: pointer;
      user-select: none;
    }
    /* 체크박스: 테두리·체크배경을 동일한 연회색(#C9CFDA)으로 통일, 체크 표시는 차분한 회색 */
    .toggle input {
      appearance: none;
      -webkit-appearance: none;
      margin: 0;
      width: 14px;
      height: 14px;
      border: 1.5px solid #C9CFDA;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      position: relative;
    }
    .toggle input:checked {
      background: #C9CFDA;
      border-color: #C9CFDA;
    }
    .toggle input:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 3px;
      height: 7px;
      border: solid #5B6478;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    .icon-btn {
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      border: 0;
      color: var(--ink-3);
      padding: 2px 4px;
      border-radius: 6px;
    }
    .icon-btn:hover { color: var(--ink); background: var(--bg-soft); }
    .icon-btn.danger:hover { color: #E0567A; }

    /* 빈 상태 */
    .empty {
      flex: 1;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-3);
      font-size: 13px;
      padding: 24px 16px;
      text-align: center;
      min-height: 120px;
    }

    /* ===== 수정 모달 ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(31, 36, 51, 0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    .modal-backdrop[hidden] { display: none; }

    .modal {
      width: 100%;
      max-width: 440px;
      background: var(--bg);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(31, 36, 51, 0.22);
      padding: 22px 24px;
    }
    .modal h3 { margin: 0 0 16px; font-size: 17px; }
    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
      margin-bottom: 14px;
    }
    .modal label .field { width: 100%; margin-top: 5px; }
    .modal textarea.field { resize: vertical; min-height: 78px; line-height: 1.6; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 6px;
    }

    /* ===== 되돌리기 토스트 ===== */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--ink);
      color: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 12px 32px rgba(31, 36, 51, 0.28);
      padding: 12px 18px;
      font-size: 13.5px;
      z-index: 60;
    }
    .toast[hidden] { display: none; }
    .toast button {
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      border: 0;
      color: #B9C2FF;
      padding: 2px 4px;
    }
    .toast button:hover { color: #fff; }

    /* 카테고리 관리 목록 */
    .cat-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--bg-soft);
    }
    .cat-row .dot {
      width: 14px;
      height: 14px;
      border-radius: 5px;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(31, 36, 51, 0.06);
    }
    .cat-row .name {
      flex: 1;
      font-size: 13.5px;
      font-weight: 600;
      word-break: break-word;
    }
    .icon-btn:disabled {
      opacity: 0.32;
      cursor: not-allowed;
    }
    .icon-btn:disabled:hover { color: var(--ink-3); background: transparent; }
    .add-cat-btn {
      margin-top: 12px;
      width: 100%;
    }

    /* 데이터 백업 영역 */
    .backup-box {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .backup-title {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
    }
    .backup-row {
      display: flex;
      gap: 8px;
    }
    .backup-row .btn {
      flex: 1;
      font-size: 12.5px;
      padding: 7px 8px;
    }

    /* 팔레트 선택 */
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
      margin-bottom: 8px;
    }
    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .swatch-btn {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      box-shadow: inset 0 0 0 1px rgba(31, 36, 51, 0.07);
      transition: transform .1s ease;
    }
    .swatch-btn:hover { transform: scale(1.06); }
    .swatch-btn[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(31, 36, 51, 0.07), 0 0 0 3px rgba(91, 108, 255, 0.14);
    }

    /* 위험 버튼 / 확인 메시지 */
    .btn-danger { background: #E0567A; color: #fff; }
    .btn-danger:hover { filter: brightness(1.05); }
    .confirm-msg {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.7;
      margin: 0 0 20px;
    }
    .confirm-msg strong { color: var(--ink); }

    /* ===== 드래그 앤 드롭 ===== */
    /* 드래그 중인 플로팅 카드 — 기울임·확대 없이 원래 직사각형 그대로, 투명도만 */
    .card.dragging-card {
      position: fixed;
      z-index: 80;
      pointer-events: none;
      margin: 0;
      cursor: grabbing;
      opacity: 0.9;
      box-shadow: 0 18px 40px rgba(31, 36, 51, 0.22);
    }

    /* 놓일 위치 자리 표시 */
    .drag-placeholder {
      border: 2px dashed var(--accent);
      background: rgba(91, 108, 255, 0.06);
      border-radius: var(--radius-md);
      box-sizing: border-box;
    }

    /* 드래그 중: 텍스트 선택 방지, 빈 상태 숨김, 대상 칸 하이라이트 */
    .board.dragging { user-select: none; }
    .board.dragging .empty { display: none; }
    /* 빈 그룹도 드롭 가능하도록 최소 높이 확보 */
    .board.dragging .card-list { min-height: 64px; }
    .board.dragging .card-list.drop-active {
      background: rgba(91, 108, 255, 0.05);
      border-radius: var(--radius-md);
    }

    /* ===== 달력 ===== */
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-title { font-weight: 700; font-size: 14.5px; }
    .cal-nav {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--ink-2);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-nav:hover { background: #F1F3F8; color: var(--ink); }

    .cal-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }
    .cal-week span {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-3);
      padding: 2px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      transition: background .12s ease;
    }
    .cal-cell:hover { background: var(--bg-soft); }
    .cal-cell.muted { color: var(--ink-3); opacity: 0.5; }
    .cal-cell.today {
      font-weight: 800;
      color: var(--accent);
      box-shadow: inset 0 0 0 1.5px var(--accent);
    }
    .cal-cell.selected {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      box-shadow: none;
    }
    .cal-day { line-height: 1; }
    /* 날짜 아래 할 일 개수 — 파란 알약 배지(날짜 숫자와 확실히 구분) */
    .cal-count {
      font-size: 9px;
      line-height: 1;
      font-weight: 700;
      color: var(--accent);
      background: #E6EAFF;            /* 연한 파스텔(강조색 계열) */
      border-radius: 999px;
      padding: 1px 5px;
      min-width: 14px;
      text-align: center;
    }
    /* 오늘 칸(테두리 강조)에서도 배지 대비 유지 */
    .cal-cell.today .cal-count { color: var(--accent); background: #E6EAFF; }
    /* 선택(파란 배경) 칸: 흰 배지 + 강조색 글씨로 또렷하게 */
    .cal-cell.selected .cal-count { color: var(--accent); background: #fff; }

    /* ===== 전체 검색 (작은 고정 폭, 우측) ===== */
    .search-wrap { position: relative; flex: 0 0 260px; width: 260px; max-width: 40%; }
    .search { width: 100%; }
    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      max-height: 60vh;
      overflow-y: auto;
      z-index: 40;
      padding: 6px;
    }
    .search-results[hidden] { display: none; }
    .sr-item {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      cursor: pointer;
      font: inherit;
    }
    .sr-item:hover { background: var(--bg-soft); }
    .sr-title { font-size: 13.5px; font-weight: 600; color: var(--ink); }
    .sr-title.done { text-decoration: line-through; color: var(--ink-3); }
    .sr-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 5px;
      font-size: 11.5px;
      color: var(--ink-2);
    }
    .sr-status {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 9px;
      color: var(--ink-2);
    }
    .sr-date { color: var(--ink-3); }
    .search-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--ink-3);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ===== 접근성: 항상 보이는 포커스 링 ===== */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .cal-cell:focus-visible,
    .sr-item:focus-visible {
      outline-offset: -2px;
    }

    /* 모션 최소화 선호 존중 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
      .card.dragging-card { transform: none !important; }
    }

    /* 제목+제작자명 로고 블록(하나의 묶음으로 가운데 정렬) */
    .logo { text-align: center; margin-top: 28px; }
    .app-title {
      margin: 0;
      font-size: 40px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }
    /* 제작자 표기(제목 바로 아래 밀착, 작고 옅게) */
    .app-credit {
      margin: 1px 0 0;
      font-size: 12px;
      color: var(--ink-3);
    }
    /* 공유 버튼(우측 최상단 고정, 작은 알약형) */
    .btn.share-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 45;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      box-shadow: var(--shadow);
    }
    /* 앱 설치 버튼(좌측 최상단 고정) */
    .btn.install-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 45;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 999px;
      box-shadow: var(--shadow);
    }
    .btn.install-btn[hidden] { display: none; }

    /* 설치 안내 모달(그림 단계) */
    .install-modal { max-width: 380px; }
    .install-modal h3 { text-align: center; }
    .install-steps {
      list-style: none;
      margin: 6px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .install-steps li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15.5px;
      line-height: 1.5;
      color: var(--ink);
    }
    .step-num {
      flex: 0 0 auto;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .step-ico {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .step-ico svg { width: 26px; height: 26px; }
    .step-txt { flex: 1; }
    .step-txt b { color: var(--accent); }
    .install-hint {
      text-align: center;
      font-size: 13px;
      color: var(--ink-3);
      margin: 16px 0 0;
    }
    /* QR 공유 모달 */
    .share-modal { max-width: 340px; text-align: center; }
    .qr-box {
      display: inline-block;
      background: #fff;
      padding: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      margin: 4px 0 14px;
    }
    .qr-box canvas {
      display: block;
      width: 100%;
      max-width: 248px;
      height: auto;
      image-rendering: pixelated;
    }
    .share-url {
      font-size: 12.5px;
      color: var(--ink-2);
      word-break: break-all;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      margin-bottom: 16px;
    }

    /* 알림 시점 선택(태스크 모달) */
    .reminder-opts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin: 6px 0 16px;
    }
    .rem-opt {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
    }
    .rem-opt input { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .rem-opt.rem-none { color: var(--ink-2); }

    /* 다가온 할 일 알림 모달 */
    .alert-modal { max-width: 380px; }
    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 4px 0 4px;
      max-height: 50vh;
      overflow-y: auto;
    }
    .alert-item {
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      background: var(--bg-soft);
      padding: 9px 12px;
    }
    .alert-item .ai-title { font-size: 14px; font-weight: 600; color: var(--ink); word-break: break-word; }
    .alert-item .ai-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; font-size: 11.5px; color: var(--ink-2); }
    .alert-item .ai-when {
      font-weight: 700;
      color: var(--accent);
      background: #E6EAFF;
      border-radius: 999px;
      padding: 1px 8px;
    }
    .alert-actions { align-items: center; gap: 12px; }
    .alert-skip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: auto;
      font-size: 12.5px;
      color: var(--ink-2);
      cursor: pointer;
      user-select: none;
    }
    .alert-skip input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

    /* ===== 모바일(≤600px): 상단 세로 적층 ===== */
    @media (max-width: 600px) {
      /* 1행: 카테고리줄 / 2행: 검색(전폭) — 좌우 2분할 해제 */
      .topbar { flex-direction: column; align-items: stretch; gap: 10px; }
      .topbar-left { width: 100%; flex: 1 1 auto; }
      .search-wrap { width: 100%; max-width: none; flex: 1 1 auto; }
      .search { width: 100%; }

      /* 상단 고정 버튼: 항상 화면 안, 약간 축소 */
      .btn.share-btn { top: 10px; right: 10px; padding: 4px 10px; font-size: 11px; }
      .btn.install-btn { top: 10px; left: 10px; padding: 4px 10px; font-size: 11px; }

      .card-actions { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
  <!-- 앱 설치 버튼: 좌측 최상단 고정(설치됨/standalone이면 숨김) -->
  <button class="btn btn-primary install-btn" type="button" id="installBtn">📲 앱 설치</button>
  <!-- 공유 버튼: 우측 최상단 고정 -->
  <button class="btn btn-ghost share-btn" type="button" id="shareBtn">🔗 공유</button>

  <div class="app">
    <!-- 앱 제목 + 제작자명(하나의 로고 블록) -->
    <div class="logo">
      <h1 class="app-title">To Do List</h1>
      <p class="app-credit">© 2026 roekabella</p>
    </div>

    <!-- ① 맨 위: 달력 (가운데 정렬) -->
    <section class="calendar-center">
      <div class="panel cal-panel">
        <div class="cal-head">
          <button class="cal-nav" type="button" id="calPrev" aria-label="이전 달">‹</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="cal-nav" type="button" id="calNext" aria-label="다음 달">›</button>
        </div>
        <div class="cal-week" aria-hidden="true">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </section>

    <!-- ② 카테고리 라벨 + 색 범례 + 관리 (좌) / 검색 (우) -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="legend-label">🏷️ Category</span>
        <div class="cat-legend" id="catLegend" aria-label="Category 색 범례"></div>
        <span class="legend-sep" aria-hidden="true"></span>
        <button class="btn btn-primary manage-btn" type="button" id="manageCatBtn">⚙ 관리</button>
      </div>
      <div class="search-wrap">
        <label class="search">
          <span aria-hidden="true">🔍</span>
          <input type="text" id="searchInput" placeholder="검색…"
                 aria-label="할 일 검색" autocomplete="off" />
        </label>
        <div class="search-results" id="searchResults" role="listbox" hidden></div>
      </div>
    </header>

    <!-- ③ 하단: 할 일 → 진행중 → 완료 (전폭 한 줄 카드, 항상 펼침) -->
    <section class="board" id="board">
      <div class="column" data-status="todo">
        <div class="column-head">
          <span class="group-icon" aria-hidden="true">📋</span>
          <h2>할 일</h2>
          <span class="count" id="count-todo">0</span>
          <span class="head-spacer"></span>
          <button class="btn btn-primary add-task-btn" type="button" id="addTaskBtn">+ 추가</button>
        </div>
        <div class="card-list" id="list-todo"></div>
      </div>

      <div class="column" data-status="doing">
        <div class="column-head">
          <span class="group-icon" aria-hidden="true">⏳</span>
          <h2>진행중</h2>
          <span class="count" id="count-doing">0</span>
        </div>
        <div class="card-list" id="list-doing"></div>
      </div>

      <div class="column" data-status="followup">
        <div class="column-head">
          <span class="group-icon" aria-hidden="true">📣</span>
          <h2>팔로업</h2>
          <span class="count" id="count-followup">0</span>
        </div>
        <div class="card-list" id="list-followup"></div>
      </div>

      <div class="column" data-status="done">
        <div class="column-head">
          <span class="group-icon" aria-hidden="true">✅</span>
          <h2>완료</h2>
          <span class="count" id="count-done">0</span>
        </div>
        <div class="card-list" id="list-done"></div>
      </div>
    </section>
  </div>

  <!-- 할 일 추가/수정 모달 -->
  <div class="modal-backdrop" id="editModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editHeading">
      <h3 id="editHeading">할 일 추가</h3>
      <form id="editForm">
        <label>제목
          <input class="field" type="text" id="editTitle" />
        </label>
        <label>카테고리
          <select class="field" id="editCategory"></select>
        </label>
        <label>날짜
          <input class="field" type="date" id="editDate" />
        </label>
        <label>상세 내용
          <textarea class="field" id="editMemo" placeholder="상세 내용 (선택)"></textarea>
        </label>
        <span class="field-label">알림 시점 (날짜 기준, 여러 개 선택 가능)</span>
        <div class="reminder-opts" id="reminderOpts">
          <label class="rem-opt"><input type="checkbox" value="7d" /> 일주일 전</label>
          <label class="rem-opt"><input type="checkbox" value="3d" /> 3일 전</label>
          <label class="rem-opt"><input type="checkbox" value="1d" /> 1일 전</label>
          <label class="rem-opt"><input type="checkbox" value="today" /> 당일</label>
          <label class="rem-opt rem-none"><input type="checkbox" value="none" data-none="1" /> 알림 제외</label>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" id="editCancel">취소</button>
          <button class="btn btn-primary" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 다가온 할 일 알림 모달(앱 열 때) -->
  <div class="modal-backdrop" id="alertModal" hidden>
    <div class="modal alert-modal" role="dialog" aria-modal="true" aria-labelledby="alertHeading">
      <h3 id="alertHeading">🔔 다가온 할 일</h3>
      <div id="alertList" class="alert-list"></div>
      <div class="modal-actions alert-actions">
        <label class="alert-skip"><input type="checkbox" id="alertSkipToday" /> 오늘 하루 안 보기</label>
        <button class="btn btn-primary" type="button" id="alertClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 카테고리 관리 모달 (목록 + 추가 진입) -->
  <div class="modal-backdrop" id="manageModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="manageHeading">
      <h3 id="manageHeading">카테고리 관리</h3>
      <div class="cat-list" id="catList"></div>
      <button class="btn btn-ghost add-cat-btn" type="button" id="addCatBtn">+ 카테고리 추가</button>

      <div class="backup-box">
        <p class="backup-title">데이터 백업</p>
        <div class="backup-row">
          <button class="btn btn-ghost" type="button" id="exportBtn">⬇️ 백업 내보내기</button>
          <button class="btn btn-ghost" type="button" id="importBtn">⬆️ 백업 가져오기</button>
        </div>
        <input type="file" id="importFile" accept="application/json,.json" hidden />
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" id="manageClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 카테고리 추가/수정 모달 -->
  <div class="modal-backdrop" id="categoryModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="categoryHeading">
      <h3 id="categoryHeading">카테고리 추가</h3>
      <form id="categoryForm">
        <label>이름
          <input class="field" type="text" id="categoryName" placeholder="카테고리 이름" />
        </label>
        <span class="field-label">색 (팔레트에서 선택)</span>
        <div class="palette" id="palette"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" id="categoryCancel">취소</button>
          <button class="btn btn-primary" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-backdrop" id="confirmModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmHeading">
      <h3 id="confirmHeading">삭제 확인</h3>
      <p class="confirm-msg" id="confirmMessage"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" id="confirmCancel">취소</button>
        <button class="btn btn-danger" type="button" id="confirmOk">삭제</button>
      </div>
    </div>
  </div>

  <!-- 되돌리기 토스트 -->
  <div class="toast" id="toast" hidden>
    <span id="toastMsg"></span>
    <button type="button" id="toastUndo">되돌리기</button>
  </div>

  <!-- QR 공유 모달 -->
  <div class="modal-backdrop" id="shareModal" hidden>
    <div class="modal share-modal" role="dialog" aria-modal="true" aria-labelledby="shareHeading">
      <h3 id="shareHeading">QR 코드로 공유</h3>
      <div class="qr-box"><canvas id="qrCanvas" aria-label="사이트 주소 QR 코드"></canvas></div>
      <div class="share-url" id="shareUrl"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" id="shareClose">닫기</button>
        <button class="btn btn-primary" type="button" id="shareCopy">주소 복사</button>
      </div>
    </div>
  </div>

  <!-- 앱 설치 안내 모달(미지원 브라우저용 그림 안내) -->
  <div class="modal-backdrop" id="installModal" hidden>
    <div class="modal install-modal" role="dialog" aria-modal="true" aria-labelledby="installHeading">
      <h3 id="installHeading">홈 화면에 앱 추가하기</h3>
      <div id="installSteps"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" type="button" id="installClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 설치 완료 토스트 -->
  <div class="toast" id="installToast" hidden><span id="installToastMsg"></span></div>

  <script>
    "use strict";

    /* =========================================================
     * 데이터 계층 (Step 1)
     * 스키마
     *   Category { id, name, color, order }
     *   Task     { id, title, memo, categoryId,
     *              status('todo'|'doing'|'done'),
     *              date('YYYY-MM-DD'), order, createdAt, updatedAt }
     * ========================================================= */

    const STORAGE_KEY = "todoapp.v1";

    /* id 생성기: crypto.randomUUID 우선, 미지원 환경 폴백 */
    function uid() {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }
      // 폴백: RFC4122 v4 형태의 유사 UUID
      if (typeof crypto !== "undefined" && typeof crypto.getRandomValues === "function") {
        const b = crypto.getRandomValues(new Uint8Array(16));
        b[6] = (b[6] & 0x0f) | 0x40;
        b[8] = (b[8] & 0x3f) | 0x80;
        const h = [...b].map((x) => x.toString(16).padStart(2, "0"));
        return `${h[0]}${h[1]}${h[2]}${h[3]}-${h[4]}${h[5]}-${h[6]}${h[7]}-${h[8]}${h[9]}-${h[10]}${h[11]}${h[12]}${h[13]}${h[14]}${h[15]}`;
      }
      // 최후 폴백
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }

    /* 오늘 날짜를 'YYYY-MM-DD'(로컬 기준)로 반환 */
    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    /* 기본 카테고리 4종 시드 */
    function defaultCategories() {
      return [
        { id: uid(), name: "업무", color: "#C7E0FF", order: 0 },
        { id: uid(), name: "일상", color: "#FFF1C2", order: 1 },
        { id: uid(), name: "공부", color: "#FFE0EC", order: 2 },
        { id: uid(), name: "기타", color: "#E8ECF2", order: 3 },
      ];
    }

    /* 앱 상태 (메모리) */
    let state = null;

    /* localStorage 읽기 */
    function load() {
      let parsed = null;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) parsed = JSON.parse(raw);
      } catch (e) {
        console.warn("저장 데이터를 읽지 못했습니다. 새로 초기화합니다.", e);
        parsed = null;
      }

      if (parsed && Array.isArray(parsed.categories) && Array.isArray(parsed.tasks)) {
        state = parsed;
        // selectedDate 누락 방어
        if (!state.selectedDate) state.selectedDate = todayStr();
        // 업무 기존 하늘색(#DCEBFF)을 또렷한 하늘색(#C7E0FF)으로 1회 마이그레이션
        let migrated = false;
        state.categories.forEach((c) => {
          if ((c.color || "").toUpperCase() === "#DCEBFF") { c.color = "#C7E0FF"; migrated = true; }
        });
        if (migrated) save();
      } else {
        // 최초 실행: 기본값 생성 후 즉시 저장
        state = {
          version: 1,
          categories: defaultCategories(),
          tasks: [],
          selectedDate: todayStr(),
        };
        save();
      }
      return state;
    }

    /* localStorage 쓰기 — 모든 데이터 변경 시 즉시 호출 */
    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error("저장에 실패했습니다.", e);
      }
    }

    /* 초기화 */
    load();

    /* =========================================================
     * 데이터 조작 헬퍼 (Step 2)
     * 모든 변경은 즉시 save() 후 render() 한다.
     * ========================================================= */

    const STATUSES = ["todo", "doing", "followup", "done"];

    function nowISO() { return new Date().toISOString(); }

    function getCategory(id) {
      return state.categories.find((c) => c.id === id) || null;
    }

    /* selectedDate에 속한 할 일만 */
    function tasksForDate(date) {
      return state.tasks.filter((t) => t.date === date);
    }

    /* 특정 상태/날짜 그룹의 다음 order(최하단) */
    function nextOrder(status, date) {
      const peers = state.tasks.filter((t) => t.status === status && t.date === date);
      return peers.reduce((max, t) => Math.max(max, t.order), -1) + 1;
    }

    /* 추가: status='todo'로 해당 날짜 '할 일' 최하단에 */
    function addTask({ title, memo, categoryId, date, reminders }) {
      const t = {
        id: uid(),
        title: title.trim(),
        memo: (memo || "").trim(),
        categoryId: categoryId,
        status: "todo",
        date: date,
        reminders: Array.isArray(reminders) ? reminders : [],
        order: nextOrder("todo", date),
        createdAt: nowISO(),
        updatedAt: nowISO(),
      };
      state.tasks.push(t);
      save();
      render();
      return t;
    }

    /* 수정: 제목·상세·카테고리·날짜 편집 */
    function updateTask(id, patch) {
      const t = state.tasks.find((x) => x.id === id);
      if (!t) return;
      // 날짜가 바뀌면 '할 일' 기준으로 위치 재배치
      if (patch.date && patch.date !== t.date) {
        t.order = nextOrder(t.status, patch.date);
      }
      if (patch.title !== undefined) t.title = patch.title.trim();
      if (patch.memo !== undefined) t.memo = patch.memo.trim();
      if (patch.categoryId !== undefined) t.categoryId = patch.categoryId;
      if (patch.date !== undefined) t.date = patch.date;
      if (patch.reminders !== undefined) t.reminders = Array.isArray(patch.reminders) ? patch.reminders : [];
      t.updatedAt = nowISO();
      save();
      render();
    }

    /* 삭제(되돌리기용으로 삭제된 항목 반환) */
    function deleteTask(id) {
      const idx = state.tasks.findIndex((x) => x.id === id);
      if (idx === -1) return null;
      const [removed] = state.tasks.splice(idx, 1);
      save();
      render();
      return removed;
    }

    /* 되돌리기: 삭제했던 task 객체를 그대로 복원 */
    function restoreTask(task) {
      if (!task) return;
      state.tasks.push(task);
      save();
      render();
    }

    /* 상태 전환: 대상 섹션 최하단으로 이동(order 갱신) */
    function setStatus(id, status) {
      const t = state.tasks.find((x) => x.id === id);
      if (!t || t.status === status) return;
      t.status = status;
      t.order = nextOrder(status, t.date);
      t.updatedAt = nowISO();
      save();
      render();
    }

    /* ----- 카테고리 ----- */

    /* 사전 정의된 파스텔 팔레트(톤 일관성 유지 — 임의 색 입력 금지) */
    const PALETTE = [
      "#DCEBFF", // 블루
      "#FFF1C2", // 옐로
      "#FFE0EC", // 핑크
      "#E8ECF2", // 그레이
      "#DDF3E4", // 민트
      "#EADCFF", // 라벤더
      "#FFE6D2", // 피치
      "#A7E0D8", // 청록(teal) — 기존 어떤 계열과도 안 겹침
    ];

    function nextCategoryOrder() {
      return state.categories.reduce((max, c) => Math.max(max, c.order), -1) + 1;
    }

    /* 해당 카테고리에 속한 할 일들 */
    function tasksInCategory(id) {
      return state.tasks.filter((t) => t.categoryId === id);
    }

    function addCategory(name, color) {
      const c = { id: uid(), name: name.trim(), color, order: nextCategoryOrder() };
      state.categories.push(c);
      save();
      refreshCategoryUI();
      return c;
    }

    /* 수정: 색을 바꾸면 카드는 렌더 시 getCategory().color를 참조하므로 자동 갱신 */
    function updateCategory(id, patch) {
      const c = getCategory(id);
      if (!c) return;
      if (patch.name !== undefined) c.name = patch.name.trim();
      if (patch.color !== undefined) c.color = patch.color;
      save();
      refreshCategoryUI();
      render(); // 소속 할 일의 색·카테고리명 즉시 반영
    }

    /* 삭제: 소속 할 일도 함께 삭제. 최소 1개는 남겨야 함 */
    function deleteCategory(id) {
      if (state.categories.length <= 1) return false;
      state.tasks = state.tasks.filter((t) => t.categoryId !== id);
      state.categories = state.categories.filter((c) => c.id !== id);
      save();
      refreshCategoryUI();
      render();
      return true;
    }

    /* =========================================================
     * UI 렌더 계층
     * ========================================================= */

    const el = {
      addTaskBtn: document.getElementById("addTaskBtn"),
      board: document.querySelector(".board"),
      lists: {
        todo: document.getElementById("list-todo"),
        doing: document.getElementById("list-doing"),
        followup: document.getElementById("list-followup"),
        done: document.getElementById("list-done"),
      },
      counts: {
        todo: document.getElementById("count-todo"),
        doing: document.getElementById("count-doing"),
        followup: document.getElementById("count-followup"),
        done: document.getElementById("count-done"),
      },
      editModal: document.getElementById("editModal"),
      editForm: document.getElementById("editForm"),
      editHeading: document.getElementById("editHeading"),
      editTitle: document.getElementById("editTitle"),
      editCategory: document.getElementById("editCategory"),
      editDate: document.getElementById("editDate"),
      editMemo: document.getElementById("editMemo"),
      reminderOpts: document.getElementById("reminderOpts"),
      editCancel: document.getElementById("editCancel"),
      // 다가온 할 일 알림
      alertModal: document.getElementById("alertModal"),
      alertList: document.getElementById("alertList"),
      alertSkipToday: document.getElementById("alertSkipToday"),
      alertClose: document.getElementById("alertClose"),
      toast: document.getElementById("toast"),
      toastMsg: document.getElementById("toastMsg"),
      toastUndo: document.getElementById("toastUndo"),
      // 카테고리 범례 + 관리
      catLegend: document.getElementById("catLegend"),
      manageCatBtn: document.getElementById("manageCatBtn"),
      manageModal: document.getElementById("manageModal"),
      manageClose: document.getElementById("manageClose"),
      catList: document.getElementById("catList"),
      addCatBtn: document.getElementById("addCatBtn"),
      categoryModal: document.getElementById("categoryModal"),
      categoryForm: document.getElementById("categoryForm"),
      categoryHeading: document.getElementById("categoryHeading"),
      categoryName: document.getElementById("categoryName"),
      categoryCancel: document.getElementById("categoryCancel"),
      palette: document.getElementById("palette"),
      // 삭제 확인
      confirmModal: document.getElementById("confirmModal"),
