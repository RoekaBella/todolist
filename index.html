    };

    const STATUS_LABEL = { todo: "할 일", doing: "진행중", followup: "팔로업", done: "완료" };

    const EMPTY_TEXT = {
      todo: "할 일을 추가해 보세요",
      doing: "여기서 진행 중인 일을 모아 보세요",
      followup: "회신·확인 대기 중인 일을 모아 보세요",
      done: "완료하면 여기에 쌓여요",
    };

    /* 카테고리 <select> 옵션 채우기 */
    function fillCategoryOptions(selectEl, selectedId) {
      selectEl.innerHTML = "";
      state.categories
        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c.id;
          opt.textContent = c.name;
          if (c.id === selectedId) opt.selected = true;
          selectEl.appendChild(opt);
        });
    }

    /* hex 색을 흰색과 섞어 옅게(ratio=색 비율, 작을수록 흰색에 가까움) */
    function tintColor(hex, ratio) {
      const m = /^#?([0-9a-f]{6})$/i.exec(hex || "");
      if (!m) return null;
      const n = parseInt(m[1], 16);
      const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      const mix = (ch) => Math.round(255 + (ch - 255) * ratio);
      return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
    }

    /* 카드 한 장 생성 — 전폭 한 줄: [번호][컨트롤][제목+상세][수정/삭제] */
    function createCard(t, num) {
      const cat = getCategory(t.categoryId);
      const card = document.createElement("div");
      card.className = "card" + (t.status === "done" ? " is-done" : "");
      card.dataset.id = t.id;
      // 카드 배경 = 카테고리 색의 옅은 파스텔(흰색과 혼합해 톤다운)
      if (cat) card.style.background = tintColor(cat.color, 0.5);

      // ── 그룹 내 순서 번호(1부터) ──
      const no = document.createElement("span");
      no.className = "card-no";
      no.textContent = num;
      card.appendChild(no);

      // ── 좌측: 상태 컨트롤(완료, 진행중) — 색 점 제거 ──
      const left = document.createElement("div");
      left.className = "card-left";

      const controls = document.createElement("div");
      controls.className = "card-controls";

      // 완료 체크박스
      const doneLabel = document.createElement("label");
      doneLabel.className = "toggle";
      const done = document.createElement("input");
      done.type = "checkbox";
      done.dataset.action = "done";
      done.checked = t.status === "done";
      doneLabel.appendChild(done);
      doneLabel.appendChild(document.createTextNode("완료"));
      controls.appendChild(doneLabel);

      // 진행중 토글
      const doingLabel = document.createElement("label");
      doingLabel.className = "toggle";
      const doing = document.createElement("input");
      doing.type = "checkbox";
      doing.dataset.action = "doing";
      doing.checked = t.status === "doing";
      doingLabel.appendChild(doing);
      doingLabel.appendChild(document.createTextNode("진행중"));
      controls.appendChild(doingLabel);

      // 팔로업 토글
      const followLabel = document.createElement("label");
      followLabel.className = "toggle";
      const follow = document.createElement("input");
      follow.type = "checkbox";
      follow.dataset.action = "followup";
      follow.checked = t.status === "followup";
      followLabel.appendChild(follow);
      followLabel.appendChild(document.createTextNode("팔로업"));
      controls.appendChild(followLabel);

      left.appendChild(controls);
      card.appendChild(left);

      // ── 가운데: 제목 + 상세(줄바꿈 허용, 말줄임 없음) ──
      const main = document.createElement("div");
      main.className = "card-main";
      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = t.title;
      main.appendChild(title);
      if (t.memo) {
        const memo = document.createElement("div");
        memo.className = "card-memo";
        memo.textContent = t.memo;
        main.appendChild(memo);
      }
      card.appendChild(main);

      // ── 우측: 수정 / 삭제(항상 노출) ──
      const actions = document.createElement("div");
      actions.className = "card-actions";

      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "icon-btn";
      editBtn.dataset.action = "edit";
      editBtn.textContent = "수정";
      actions.appendChild(editBtn);

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "icon-btn danger";
      delBtn.dataset.action = "delete";
      delBtn.textContent = "삭제";
      actions.appendChild(delBtn);

      card.appendChild(actions);
      return card;
    }

    /* 전체 렌더 */
    function render() {
      const list = tasksForDate(state.selectedDate);
      STATUSES.forEach((status) => {
        const container = el.lists[status];
        const items = list
          .filter((t) => t.status === status)
          .sort((a, b) => a.order - b.order);
        el.counts[status].textContent = items.length;
        container.innerHTML = "";
        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = EMPTY_TEXT[status];
          container.appendChild(empty);
        } else {
          // 그룹 내부에서 1부터 번호 부여(정렬 순서 기준)
          items.forEach((t, i) => container.appendChild(createCard(t, i + 1)));
        }
      });
      renderCalendar();                       // 날짜별 점 표시 최신화
      if (searchActive()) renderSearch(el.searchInput.value); // 검색 열린 상태면 갱신
    }

    /* ===== 카테고리 관리 UI ===== */

    /* 카테고리 목록 패널 렌더 */
    function renderCategoryList() {
      const wrap = el.catList;
      wrap.innerHTML = "";
      const lockDelete = state.categories.length <= 1;
      state.categories
        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach((c) => {
          const row = document.createElement("div");
          row.className = "cat-row";
          row.dataset.id = c.id;

          const dot = document.createElement("span");
          dot.className = "dot";
          dot.style.background = c.color;
          row.appendChild(dot);

          const name = document.createElement("span");
          name.className = "name";
          name.textContent = c.name;
          row.appendChild(name);

          const edit = document.createElement("button");
          edit.type = "button";
          edit.className = "icon-btn";
          edit.dataset.action = "cat-edit";
          edit.textContent = "수정";
          row.appendChild(edit);

          const del = document.createElement("button");
          del.type = "button";
          del.className = "icon-btn danger";
          del.dataset.action = "cat-delete";
          del.textContent = "삭제";
          if (lockDelete) {
            del.disabled = true;
            del.title = "카테고리는 최소 1개가 필요합니다";
          }
          row.appendChild(del);

          wrap.appendChild(row);
        });
    }

    /* 상단 카테고리 색 범례(필터 아님 — 색 안내 + 관리 진입 역할) */
    function renderCategoryLegend() {
      const wrap = el.catLegend;
      wrap.innerHTML = "";
      state.categories
        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach((c) => {
          const chip = document.createElement("span");
          chip.className = "legend-chip";
          chip.style.background = c.color;       // 칩 배경 = 카테고리 색
          chip.textContent = c.name;
          wrap.appendChild(chip);
        });
    }

    /* 카테고리 변경 시 범례 + 관리 목록 동시 갱신 */
    function refreshCategoryUI() {
      renderCategoryLegend();
      renderCategoryList();
    }

    /* 카테고리 모달(추가/수정 공용) */
    let editingCategoryId = null;
    let selectedColor = PALETTE[0];

    function renderPalette(selected) {
      el.palette.innerHTML = "";
      PALETTE.forEach((color) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "swatch-btn";
        b.style.background = color;
        b.dataset.color = color;
        b.setAttribute("aria-pressed", String(color === selected));
        b.setAttribute("aria-label", color);
        el.palette.appendChild(b);
      });
    }

    el.palette.addEventListener("click", (e) => {
      const b = e.target.closest(".swatch-btn");
      if (!b) return;
      selectedColor = b.dataset.color;
      [...el.palette.children].forEach((c) =>
        c.setAttribute("aria-pressed", String(c === b))
      );
    });

    function openCategoryModal(id) {
      editingCategoryId = id || null;
      if (id) {
        const c = getCategory(id);
        el.categoryHeading.textContent = "카테고리 수정";
        el.categoryName.value = c.name;
        selectedColor = c.color;
      } else {
        el.categoryHeading.textContent = "카테고리 추가";
        el.categoryName.value = "";
        selectedColor = PALETTE[0];
      }
      el.categoryName.classList.remove("invalid");
      renderPalette(selectedColor);
      el.categoryModal.hidden = false;
      el.categoryName.focus();
    }
    function closeCategoryModal() {
      el.categoryModal.hidden = true;
      editingCategoryId = null;
    }

    /* 카테고리 관리 모달(목록 + 추가 진입) */
    function openManageModal() { el.manageModal.hidden = false; }
    function closeManageModal() { el.manageModal.hidden = true; }
    el.manageCatBtn.addEventListener("click", openManageModal);
    el.manageClose.addEventListener("click", closeManageModal);
    el.manageModal.addEventListener("click", (e) => {
      if (e.target === el.manageModal) closeManageModal();
    });

    el.addCatBtn.addEventListener("click", () => openCategoryModal(null));
    el.categoryCancel.addEventListener("click", closeCategoryModal);
    el.categoryModal.addEventListener("click", (e) => {
      if (e.target === el.categoryModal) closeCategoryModal();
    });

    el.categoryForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = el.categoryName.value.trim();
      if (!name) {
        el.categoryName.classList.add("invalid");
        el.categoryName.focus();
        return;
      }
      el.categoryName.classList.remove("invalid");
      if (editingCategoryId) updateCategory(editingCategoryId, { name, color: selectedColor });
      else addCategory(name, selectedColor);
      closeCategoryModal();
    });

    /* 카테고리 목록 상호작용 */
    el.catList.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn || btn.disabled) return;
      const row = e.target.closest(".cat-row");
      if (!row) return;
      const id = row.dataset.id;
      if (btn.dataset.action === "cat-edit") openCategoryModal(id);
      else if (btn.dataset.action === "cat-delete") handleCategoryDelete(id);
    });

    /* 삭제: 소속 할 일 개수를 정확히 알리는 확인 단계 */
    function handleCategoryDelete(id) {
      if (state.categories.length <= 1) return; // 최소 1개 보장
      const cat = getCategory(id);
      const n = tasksInCategory(id).length;
      const msg =
        n > 0
          ? `'${cat.name}' 카테고리를 삭제하면 이 카테고리의 할 일 ${n}개가 함께 삭제됩니다. 계속할까요?`
          : `'${cat.name}' 카테고리를 삭제할까요?`;
      confirmDialog(msg).then((ok) => {
        if (ok) deleteCategory(id);
      });
    }

    /* ===== 확인 모달(Promise 기반, 삭제/덮어쓰기 등 공용) ===== */
    let confirmResolver = null;
    function confirmDialog(message, opts) {
      opts = opts || {};
      el.confirmMessage.textContent = message;
      document.getElementById("confirmHeading").textContent = opts.heading || "삭제 확인";
      el.confirmOk.textContent = opts.okLabel || "삭제";
      el.confirmOk.className = "btn " + (opts.okClass || "btn-danger");
      el.confirmModal.hidden = false;
      return new Promise((resolve) => { confirmResolver = resolve; });
    }
    function settleConfirm(value) {
      el.confirmModal.hidden = true;
      if (confirmResolver) { confirmResolver(value); confirmResolver = null; }
    }
    el.confirmOk.addEventListener("click", () => settleConfirm(true));
    el.confirmCancel.addEventListener("click", () => settleConfirm(false));
    el.confirmModal.addEventListener("click", (e) => {
      if (e.target === el.confirmModal) settleConfirm(false);
    });

    /* ===== '할 일' 그룹 헤더의 + 추가 → 모달 ===== */
    el.addTaskBtn.addEventListener("click", () => openTaskModal(null));

    /* ===== 카드 상호작용(이벤트 위임) ===== */
    el.board.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const cardEl = e.target.closest(".card");
      if (!cardEl) return;
      const id = cardEl.dataset.id;
      const action = btn.dataset.action;

      if (action === "edit") openTaskModal(id);
      else if (action === "delete") handleDelete(id);
    });

    el.board.addEventListener("change", (e) => {
      const input = e.target.closest("input[data-action]");
      if (!input) return;
      const cardEl = e.target.closest(".card");
      if (!cardEl) return;
      const id = cardEl.dataset.id;
      const action = input.dataset.action;

      if (action === "done") {
        // 완료가 우선: 켜면 done, 끄면 todo(팔로업 등에서도 완료 시 곧바로 완료로)
        setStatus(id, input.checked ? "done" : "todo");
      } else if (action === "doing") {
        setStatus(id, input.checked ? "doing" : "todo");
      } else if (action === "followup") {
        setStatus(id, input.checked ? "followup" : "todo");
      }
    });

    /* ===== 드래그 앤 드롭 (Pointer 이벤트, 마우스+터치) ===== */
    const DRAG_THRESHOLD = 6; // px: 이만큼 움직여야 드래그로 인정(클릭과 구분)
    let drag = null;

    el.board.addEventListener("pointerdown", (e) => {
      if (e.button != null && e.button !== 0) return;        // 주 버튼/터치만
      const card = e.target.closest(".card");
      if (!card) return;
      // 체크박스·토글·버튼 위에서 시작하면 드래그하지 않음(기존 동작 보존)
      if (e.target.closest("input, button, label")) return;

      drag = {
        id: card.dataset.id,
        card,
        pointerId: e.pointerId,
        startX: e.clientX,
        startY: e.clientY,
        started: false,
        placeholder: null,
        currentList: null,
        grabX: 0,
        grabY: 0,
      };
      // 캡처/리페어런팅에 의존하지 않도록 이동·종료는 window에서 처리한다.
      // (카드를 DOM에서 분리하면 pointer capture가 풀려 드래그가 멈추는 버그를 회피)
      window.addEventListener("pointermove", onDragMove);
      window.addEventListener("pointerup", onDragEnd);
      window.addEventListener("pointercancel", onDragEnd);
    });

    function startDrag(e) {
      const card = drag.card;
      const r = card.getBoundingClientRect();
      drag.grabX = e.clientX - r.left;
      drag.grabY = e.clientY - r.top;

      // 자리 표시 박스를 원래 위치(카드 앞)에 삽입
      const ph = document.createElement("div");
      ph.className = "drag-placeholder";
      ph.style.height = r.height + "px";
      drag.placeholder = ph;
      drag.currentList = card.parentElement;
      card.parentElement.insertBefore(ph, card);

      // 카드를 '제자리에서' 플로팅 처리(DOM 위치는 그대로 — 캡처 유실 방지)
      card.classList.add("dragging-card");
      card.style.width = r.width + "px";
      card.style.left = r.left + "px";
      card.style.top = r.top + "px";

      el.board.classList.add("dragging");
      drag.started = true;
    }

    function onDragMove(e) {
      if (!drag) return;
      if (!drag.started) {
        const dx = e.clientX - drag.startX;
        const dy = e.clientY - drag.startY;
        if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
        startDrag(e);
      }
      e.preventDefault();

      // 플로팅 카드 위치 갱신
      drag.card.style.left = e.clientX - drag.grabX + "px";
      drag.card.style.top = e.clientY - drag.grabY + "px";

      // 포인터 아래의 카드 목록 탐색(플로팅 카드는 pointer-events:none 이라 무시됨)
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const list = under && under.closest ? under.closest(".card-list") : null;
      if (list) {
        if (list !== drag.currentList) {
          if (drag.currentList) drag.currentList.classList.remove("drop-active");
          drag.currentList = list;
        }
        list.classList.add("drop-active");
        positionPlaceholder(list, e.clientY);
      }
    }

    /* 포인터 Y 위치에 맞춰 placeholder를 카드 사이/끝에 삽입(드래그 중 카드는 제외) */
    function positionPlaceholder(list, y) {
      const ph = drag.placeholder;
      const cards = [...list.children].filter(
        (c) => c.classList.contains("card") && c !== drag.card
      );
      let before = null;
      for (const c of cards) {
        const r = c.getBoundingClientRect();
        if (y < r.top + r.height / 2) { before = c; break; }
      }
      if (before) {
        if (ph.nextSibling !== before) list.insertBefore(ph, before);
      } else if (list.lastChild !== ph) {
        list.appendChild(ph);
      }
    }

    function onDragEnd(e) {
      if (!drag) return;
      const d = drag;
      drag = null;

      window.removeEventListener("pointermove", onDragMove);
      window.removeEventListener("pointerup", onDragEnd);
      window.removeEventListener("pointercancel", onDragEnd);

      if (!d.started) return; // 단순 탭/클릭 — 아무 변화 없음

      e.preventDefault();
      const list = d.placeholder.parentElement;
      commitDrag(d.id, list, d.placeholder);

      // 시각 정리(render()가 카드를 새로 그리므로 임시 노드만 정리)
      el.board.classList.remove("dragging");
      if (d.currentList) d.currentList.classList.remove("drop-active");
      d.placeholder.remove();
      // 플로팅 스타일 해제(render()가 곧 카드를 다시 그림)
      d.card.classList.remove("dragging-card");
      d.card.removeAttribute("style");
    }

    /* 놓인 칸의 DOM 순서대로 status/order를 확정하고 저장 */
    function commitDrag(draggedId, list, placeholder) {
      const targetStatus = list.parentElement.dataset.status;
      const dragged = state.tasks.find((t) => t.id === draggedId);
      if (!dragged) return;
      const prevStatus = dragged.status;

      // 타깃 칸의 새 순서(placeholder = 드래그된 카드 위치).
      // 드래그 중인 카드는 제자리에 남아 있으므로 id로 제외(중복 방지).
      const ids = [];
      [...list.children].forEach((node) => {
        if (node === placeholder) ids.push(draggedId);
        else if (node.classList.contains("card") && node.dataset.id !== draggedId) {
          ids.push(node.dataset.id);
        }
      });

      dragged.status = targetStatus;
      ids.forEach((id, i) => {
        const t = state.tasks.find((x) => x.id === id);
        if (t) { t.status = targetStatus; t.order = i; }
      });

      // 칸이 바뀌었으면 원래 칸의 남은 카드 순서 재정렬(빈틈 제거)
      if (prevStatus !== targetStatus) {
        state.tasks
          .filter((t) => t.date === dragged.date && t.status === prevStatus && t.id !== draggedId)
          .sort((a, b) => a.order - b.order)
          .forEach((t, i) => { t.order = i; });
      }

      dragged.updatedAt = nowISO();
      save();
      render();
    }

    /* ===== 삭제 + 되돌리기 토스트 ===== */
    let undoTimer = null;
    function handleDelete(id) {
      const removed = deleteTask(id);
      if (!removed) return;
      showUndoToast(removed);
    }

    function showUndoToast(task) {
      clearTimeout(undoTimer);
      el.toastMsg.textContent = `'${task.title}' 삭제됨`;
      el.toast.hidden = false;
      const onUndo = () => {
        clearTimeout(undoTimer);
        el.toast.hidden = true;
        el.toastUndo.removeEventListener("click", onUndo);
        restoreTask(task);
      };
      el.toastUndo.addEventListener("click", onUndo);
      undoTimer = setTimeout(() => {
        el.toast.hidden = true;
        el.toastUndo.removeEventListener("click", onUndo);
      }, 5000);
    }

    /* ===== 할 일 추가/수정 모달(공용) ===== */
    let editingTaskId = null; // null이면 추가 모드

    /* ----- 알림 시점 체크박스 헬퍼 ----- */
    const REMINDER_KEYS = ["7d", "3d", "1d", "today"];
    function remInputs() { return [...el.reminderOpts.querySelectorAll("input")]; }
    function setReminderChecks(reminders) {
      const set = new Set(Array.isArray(reminders) ? reminders : []);
      remInputs().forEach((inp) => {
        if (inp.dataset.none) inp.checked = set.size === 0;     // 알림 제외 = 선택 없음
        else inp.checked = set.has(inp.value);
      });
    }
    function getReminderValues() {
      return remInputs().filter((i) => i.checked && !i.dataset.none).map((i) => i.value);
    }
    // '알림 제외'는 단독: 켜면 나머지 해제 / 다른 걸 켜면 제외 해제. 모두 꺼지면 제외 자동 켜짐
    el.reminderOpts.addEventListener("change", (e) => {
      const t = e.target;
      if (t.dataset.none) {
        if (t.checked) remInputs().forEach((i) => { if (!i.dataset.none) i.checked = false; });
        else if (getReminderValues().length === 0) t.checked = true; // 제외를 끄려 해도 선택 없으면 유지
      } else {
        const none = remInputs().find((i) => i.dataset.none);
        if (t.checked) none.checked = false;
        else if (getReminderValues().length === 0) none.checked = true;
      }
    });

    function openTaskModal(id) {
      editingTaskId = id || null;
      if (id) {
        const t = state.tasks.find((x) => x.id === id);
        if (!t) return;
        el.editHeading.textContent = "할 일 수정";
        el.editTitle.value = t.title;
        el.editMemo.value = t.memo || "";
        el.editDate.value = t.date;
        fillCategoryOptions(el.editCategory, t.categoryId);
        setReminderChecks(t.reminders);
      } else {
        // 추가: 기본 카테고리=첫 항목, 날짜=현재 selectedDate, 알림 없음
        el.editHeading.textContent = "할 일 추가";
        el.editTitle.value = "";
        el.editMemo.value = "";
        el.editDate.value = state.selectedDate;
        fillCategoryOptions(el.editCategory, state.categories[0] && state.categories[0].id);
        setReminderChecks([]);
      }
      el.editTitle.classList.remove("invalid");
      el.editModal.hidden = false;
      el.editTitle.focus();
    }
    function closeTaskModal() {
      el.editModal.hidden = true;
      editingTaskId = null;
    }
    el.editForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = el.editTitle.value.trim();
      if (!title) {
        el.editTitle.classList.add("invalid");
        el.editTitle.focus();
        return;
      }
      el.editTitle.classList.remove("invalid");
      const payload = {
        title,
        memo: el.editMemo.value,
        categoryId: el.editCategory.value || (state.categories[0] && state.categories[0].id),
        date: el.editDate.value || state.selectedDate,
        reminders: getReminderValues(),
      };
      if (editingTaskId) updateTask(editingTaskId, payload);
      else addTask(payload); // status='todo'로 '할 일' 최하단에 추가
      closeTaskModal();
    });
    el.editCancel.addEventListener("click", closeTaskModal);
    el.editModal.addEventListener("click", (e) => {
      if (e.target === el.editModal) closeTaskModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (!el.confirmModal.hidden) settleConfirm(false);
      else if (!el.categoryModal.hidden) closeCategoryModal();
      else if (!el.manageModal.hidden) closeManageModal();
      else if (!el.editModal.hidden) closeTaskModal();
      else if (!el.alertModal.hidden) closeAlert();
      else if (!el.searchResults.hidden) closeSearch();
    });

    /* ===== 달력 ===== */

    /* Date -> 'YYYY-MM-DD'(로컬) */
    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    /* 'YYYY-MM-DD' -> { year, month(0-11) } */
    function monthOf(dateStr) {
      const [y, m] = dateStr.split("-").map(Number);
      return { year: y, month: m - 1 };
    }
    function addMonth(view, delta) {
      const d = new Date(view.year, view.month + delta, 1);
      return { year: d.getFullYear(), month: d.getMonth() };
    }

    let calView = monthOf(state.selectedDate);

    function renderCalendar() {
      const { year, month } = calView;
      el.calTitle.textContent = `${year}년 ${month + 1}월`;

      // 날짜별 할 일 개수
      const counts = {};
      state.tasks.forEach((t) => { counts[t.date] = (counts[t.date] || 0) + 1; });

      const today = todayStr();
      const startDow = new Date(year, month, 1).getDay(); // 0=일
      const start = new Date(year, month, 1 - startDow);  // 첫 칸(이전 달 spillover 포함)

      el.calGrid.innerHTML = "";
      for (let i = 0; i < 42; i++) {
        const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
        const ds = fmtDate(d);
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "cal-cell";
        if (d.getMonth() !== month) cell.classList.add("muted");
        if (ds === today) cell.classList.add("today");
        if (ds === state.selectedDate) cell.classList.add("selected");
        cell.dataset.date = ds;
        if (ds === state.selectedDate) cell.setAttribute("aria-current", "date");
        const day = document.createElement("span");
        day.className = "cal-day";
        day.textContent = d.getDate();
        cell.appendChild(day);
        // 그 날짜의 할 일 개수(완료 포함). 0이면 표시하지 않음
        if (counts[ds]) {
          const cnt = document.createElement("span");
          cnt.className = "cal-count";
          cnt.textContent = counts[ds];
          cnt.title = `할 일 ${counts[ds]}개`;
          cell.appendChild(cnt);
        }
        el.calGrid.appendChild(cell);
      }
    }

    /* selectedDate 변경: 보드·달력을 함께 전환(추가 모달은 열 때 selectedDate 사용) */
    function setSelectedDate(date) {
      state.selectedDate = date;
      save();
      calView = monthOf(date);
      render();
    }

    el.calGrid.addEventListener("click", (e) => {
      const cell = e.target.closest(".cal-cell");
      if (!cell) return;
      setSelectedDate(cell.dataset.date);
    });
    el.calPrev.addEventListener("click", () => { calView = addMonth(calView, -1); renderCalendar(); });
    el.calNext.addEventListener("click", () => { calView = addMonth(calView, 1); renderCalendar(); });

    /* ===== 전체 검색 ===== */

    function searchActive() {
      return el.searchInput && el.searchInput.value.trim() !== "";
    }
    function closeSearch() {
      el.searchResults.hidden = true;
      el.searchResults.innerHTML = "";
    }

    function renderSearch(raw) {
      const q = (raw || "").trim().toLowerCase();
      if (!q) { closeSearch(); return; }

      const matches = state.tasks
        .filter(
          (t) =>
            (t.title || "").toLowerCase().includes(q) ||
            (t.memo || "").toLowerCase().includes(q)
        )
        .sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : a.order - b.order));

      el.searchResults.innerHTML = "";
      if (matches.length === 0) {
        const em = document.createElement("div");
        em.className = "search-empty";
        em.textContent = `'${raw.trim()}'에 일치하는 할 일이 없습니다`;
        el.searchResults.appendChild(em);
      } else {
        matches.forEach((t) => {
          const cat = getCategory(t.categoryId);
          const item = document.createElement("button");
          item.type = "button";
          item.className = "sr-item";
          item.setAttribute("role", "option");
          item.dataset.date = t.date;

          const title = document.createElement("div");
          title.className = "sr-title" + (t.status === "done" ? " done" : "");
          title.textContent = t.title;
          item.appendChild(title);

          const meta = document.createElement("div");
          meta.className = "sr-meta";
          if (cat) {
            const chip = document.createElement("span");
            chip.className = "cat-chip";
            chip.textContent = cat.name;
            chip.style.background = cat.color;
            meta.appendChild(chip);
          }
          const st = document.createElement("span");
          st.className = "sr-status";
          st.textContent = STATUS_LABEL[t.status];
          meta.appendChild(st);

          const dt = document.createElement("span");
          dt.className = "sr-date";
          dt.textContent = t.date;
          meta.appendChild(dt);

          item.appendChild(meta);
          el.searchResults.appendChild(item);
        });
      }
      el.searchResults.hidden = false;
    }

    el.searchInput.addEventListener("input", () => renderSearch(el.searchInput.value));
    el.searchInput.addEventListener("focus", () => {
      if (searchActive()) renderSearch(el.searchInput.value);
    });
    el.searchResults.addEventListener("click", (e) => {
      const item = e.target.closest(".sr-item");
      if (!item) return;
      setSelectedDate(item.dataset.date);
      el.searchInput.value = "";
      closeSearch();
    });
    // 바깥 클릭 시 결과 닫기
    document.addEventListener("click", (e) => {
      if (!el.searchResults.hidden && !e.target.closest(".search-wrap")) closeSearch();
    });

    /* =========================================================
     * QR 코드 생성기 (순수 JS, 외부 라이브러리/서버 없음)
     * 바이트 모드 · 오류복원 레벨 M · 버전 자동선택 · 마스크 자동선택
     * ========================================================= */
    const QRGEN = (function () {
      // 레벨 M: 블록당 EC 코드워드 / 블록 수 (버전 1~40)
      const ECC_M = [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28];
      const BLK_M = [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49];

      function rsMultiply(x, y) {
        let z = 0;
        for (let i = 7; i >= 0; i--) {
          z = (z << 1) ^ (((z >>> 7) & 1) * 0x11D);
          z ^= ((y >>> i) & 1) * x;
        }
        return z & 0xFF;
      }
      function rsDivisor(degree) {
        const result = new Array(degree).fill(0);
        result[degree - 1] = 1;
        let root = 1;
        for (let i = 0; i < degree; i++) {
          for (let j = 0; j < result.length; j++) {
            result[j] = rsMultiply(result[j], root);
            if (j + 1 < result.length) result[j] ^= result[j + 1];
          }
          root = rsMultiply(root, 2);
        }
        return result;
      }
      function rsRemainder(data, divisor) {
        const result = new Array(divisor.length).fill(0);
        for (const b of data) {
          const factor = b ^ result[0];
          result.shift();
          result.push(0);
          for (let i = 0; i < result.length; i++) result[i] ^= rsMultiply(divisor[i], factor);
        }
        return result;
      }
      function getNumRawDataModules(ver) {
        let result = (16 * ver + 128) * ver + 64;
        if (ver >= 2) {
          const numAlign = Math.floor(ver / 7) + 2;
          result -= (25 * numAlign - 10) * numAlign - 55;
          if (ver >= 7) result -= 36;
        }
        return result;
      }
      function getNumDataCodewords(ver) {
        return (getNumRawDataModules(ver) >> 3) - ECC_M[ver] * BLK_M[ver];
      }
      function getAlignmentPatternPositions(ver) {
        if (ver === 1) return [];
        const numAlign = Math.floor(ver / 7) + 2;
        const step = (ver === 32) ? 26 : Math.ceil((ver * 4 + 4) / (numAlign * 2 - 2)) * 2;
        const size = ver * 4 + 17;
        const result = [6];
        for (let pos = size - 7; result.length < numAlign; pos -= step) result.splice(1, 0, pos);
        return result;
      }
      function toUtf8(str) {
        const enc = unescape(encodeURIComponent(str));
        const out = new Array(enc.length);
        for (let i = 0; i < enc.length; i++) out[i] = enc.charCodeAt(i);
        return out;
      }
      function addEccAndInterleave(data, ver) {
        const numBlocks = BLK_M[ver];
        const blockEccLen = ECC_M[ver];
        const rawCw = getNumRawDataModules(ver) >> 3;
        const numShort = numBlocks - rawCw % numBlocks;
        const shortLen = Math.floor(rawCw / numBlocks);
        const rsDiv = rsDivisor(blockEccLen);
        const blocks = [];
        for (let i = 0, k = 0; i < numBlocks; i++) {
          const datLen = shortLen - blockEccLen + (i < numShort ? 0 : 1);
          const dat = data.slice(k, k + datLen);
          k += datLen;
          const ecc = rsRemainder(dat, rsDiv);
          const block = dat.slice();
          if (i < numShort) block.push(0);
          for (const b of ecc) block.push(b);
          blocks.push(block);
        }
        const result = [];
        for (let i = 0; i < blocks[0].length; i++) {
          for (let j = 0; j < blocks.length; j++) {
            if (i !== shortLen - blockEccLen || j >= numShort) result.push(blocks[j][i]);
          }
        }
        return result;
      }

      function encode(text) {
        const dataBytes = toUtf8(text);
        let ver = 0, capBits = 0;
        for (let v = 1; v <= 40; v++) {
          const cc = v <= 9 ? 8 : 16;
          const cap = getNumDataCodewords(v) * 8;
          if (4 + cc + dataBytes.length * 8 <= cap) { ver = v; capBits = cap; break; }
        }
        if (!ver) throw new Error("QR로 담기엔 주소가 너무 깁니다");
        const cc = ver <= 9 ? 8 : 16;

        const bits = [];
        const append = (val, len) => { for (let i = len - 1; i >= 0; i--) bits.push((val >>> i) & 1); };
        append(0x4, 4);
        append(dataBytes.length, cc);
        for (const b of dataBytes) append(b, 8);
        append(0, Math.min(4, capBits - bits.length));
        while (bits.length % 8 !== 0) bits.push(0);
        const dataCw = [];
        for (let i = 0; i < bits.length; i += 8) {
          let b = 0;
          for (let j = 0; j < 8; j++) b = (b << 1) | bits[i + j];
          dataCw.push(b);
        }
        for (let pad = 0xEC; dataCw.length < getNumDataCodewords(ver); pad ^= 0xEC ^ 0x11) dataCw.push(pad);
        const allCw = addEccAndInterleave(dataCw, ver);

        const size = ver * 4 + 17;
        const modules = [], isFn = [];
        for (let i = 0; i < size; i++) { modules.push(new Array(size).fill(false)); isFn.push(new Array(size).fill(false)); }
        const setFn = (x, y, d) => { modules[y][x] = d; isFn[y][x] = true; };

        // 타이밍 패턴
        for (let i = 0; i < size; i++) { setFn(6, i, i % 2 === 0); setFn(i, 6, i % 2 === 0); }
        // 파인더 + 분리자
        const finder = (cx, cy) => {
          for (let dy = -4; dy <= 4; dy++) for (let dx = -4; dx <= 4; dx++) {
            const dist = Math.max(Math.abs(dx), Math.abs(dy));
            const xx = cx + dx, yy = cy + dy;
            if (xx >= 0 && xx < size && yy >= 0 && yy < size) setFn(xx, yy, dist !== 2 && dist !== 4);
          }
        };
        finder(3, 3); finder(size - 4, 3); finder(3, size - 4);
        // 정렬 패턴
        const ap = getAlignmentPatternPositions(ver);
        for (let i = 0; i < ap.length; i++) for (let j = 0; j < ap.length; j++) {
          if ((i === 0 && j === 0) || (i === 0 && j === ap.length - 1) || (i === ap.length - 1 && j === 0)) continue;
          const cx = ap[i], cy = ap[j];
          for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) setFn(cx + dx, cy + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
        }
        // 버전 정보(7+)
        if (ver >= 7) {
          let rem = ver;
          for (let i = 0; i < 12; i++) rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
          const vbits = (ver << 12) | rem;
          for (let i = 0; i < 18; i++) {
            const b = ((vbits >>> i) & 1) === 1;
            const a = size - 11 + i % 3, bb = Math.floor(i / 3);
            setFn(a, bb, b); setFn(bb, a, b);
          }
        }
        // 포맷 정보(예약 및 그리기)
        function drawFormat(mask) {
          const data = (0 << 3) | mask; // 레벨 M = 0
          let rem = data;
          for (let i = 0; i < 10; i++) rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
          const fbits = ((data << 10) | rem) ^ 0x5412;
          const gb = (i) => ((fbits >>> i) & 1) === 1;
          for (let i = 0; i <= 5; i++) setFn(8, i, gb(i));
          setFn(8, 7, gb(6)); setFn(8, 8, gb(7)); setFn(7, 8, gb(8));
          for (let i = 9; i < 15; i++) setFn(14 - i, 8, gb(i));
          for (let i = 0; i < 8; i++) setFn(size - 1 - i, 8, gb(i));
          for (let i = 8; i < 15; i++) setFn(8, size - 15 + i, gb(i));
          setFn(8, size - 8, true); // 다크 모듈
        }
        drawFormat(0); // 예약(더미 마스크)

        // 데이터 비트 지그재그 배치
        {
          let i = 0;
          for (let right = size - 1; right >= 1; right -= 2) {
            if (right === 6) right = 5;
            for (let vert = 0; vert < size; vert++) {
              for (let j = 0; j < 2; j++) {
                const x = right - j;
                const upward = ((right + 1) & 2) === 0;
                const y = upward ? size - 1 - vert : vert;
                if (!isFn[y][x] && i < allCw.length * 8) {
                  modules[y][x] = ((allCw[i >>> 3] >>> (7 - (i & 7))) & 1) === 1;
                  i++;
                }
              }
            }
          }
        }

        function applyMask(mask) {
          for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
            if (isFn[y][x]) continue;
            let inv = false;
            switch (mask) {
              case 0: inv = (x + y) % 2 === 0; break;
              case 1: inv = y % 2 === 0; break;
              case 2: inv = x % 3 === 0; break;
              case 3: inv = (x + y) % 3 === 0; break;
              case 4: inv = (Math.floor(x / 3) + Math.floor(y / 2)) % 2 === 0; break;
              case 5: inv = (x * y) % 2 + (x * y) % 3 === 0; break;
              case 6: inv = ((x * y) % 2 + (x * y) % 3) % 2 === 0; break;
              case 7: inv = ((x + y) % 2 + (x * y) % 3) % 2 === 0; break;
            }
            if (inv) modules[y][x] = !modules[y][x];
          }
        }

        function penalty() {
          let result = 0;
          const N1 = 3, N2 = 3, N3 = 40, N4 = 10;
          const addHist = (run, h) => { if (h[0] === 0) run += size; h.pop(); h.unshift(run); };
          const count = (h) => {
            const n = h[1];
            const core = n > 0 && h[2] === n && h[3] === n * 3 && h[4] === n && h[5] === n;
            return (core && h[0] >= n * 4 && h[6] >= n ? 1 : 0) + (core && h[6] >= n * 4 && h[0] >= n ? 1 : 0);
          };
          const term = (rc, run, h) => { if (rc) { addHist(run, h); run = 0; } run += size; addHist(run, h); return count(h); };
          for (let y = 0; y < size; y++) {
            let rc = false, run = 0; const h = [0,0,0,0,0,0,0];
            for (let x = 0; x < size; x++) {
              if (modules[y][x] === rc) { run++; if (run === 5) result += N1; else if (run > 5) result++; }
              else { addHist(run, h); if (!rc) result += count(h) * N3; rc = modules[y][x]; run = 1; }
            }
            result += term(rc, run, h) * N3;
          }
          for (let x = 0; x < size; x++) {
            let rc = false, run = 0; const h = [0,0,0,0,0,0,0];
            for (let y = 0; y < size; y++) {
              if (modules[y][x] === rc) { run++; if (run === 5) result += N1; else if (run > 5) result++; }
              else { addHist(run, h); if (!rc) result += count(h) * N3; rc = modules[y][x]; run = 1; }
            }
            result += term(rc, run, h) * N3;
          }
          for (let y = 0; y < size - 1; y++) for (let x = 0; x < size - 1; x++) {
            const c = modules[y][x];
            if (c === modules[y][x + 1] && c === modules[y + 1][x] && c === modules[y + 1][x + 1]) result += N2;
          }
          let dark = 0;
          for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) if (modules[y][x]) dark++;
          const tot = size * size;
          const k = Math.ceil(Math.abs(dark * 20 - tot * 10) / tot) - 1;
          result += k * N4;
          return result;
        }

        let best = 0, bestPen = Infinity;
        for (let m = 0; m < 8; m++) {
          applyMask(m); drawFormat(m);
          const p = penalty();
          if (p < bestPen) { bestPen = p; best = m; }
          applyMask(m); // 원복
        }
        applyMask(best); drawFormat(best);

        return { size, modules };
      }

      return { encode };
    })();

    /* QR을 canvas에 그리기 (흰 배경 + quiet zone, 데스크톱에서도 크게) */
    function drawQrToCanvas(canvas, text) {
      const { size, modules } = QRGEN.encode(text);
      const border = 4;            // quiet zone(모듈 단위)
      const target = 248;          // 목표 픽셀 크기
      let scale = Math.floor(target / (size + border * 2));
      if (scale < 2) scale = 2;
      const dim = (size + border * 2) * scale;
      canvas.width = dim;
      canvas.height = dim;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, dim, dim);
      ctx.fillStyle = "#1F2433";
      for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
        if (modules[y][x]) ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
      }
    }

    /* ===== 공유 모달 ===== */
    const DEPLOY_URL = "https://roekabella.github.io/todolist/";
    const shareEl = {
      btn: document.getElementById("shareBtn"),
      modal: document.getElementById("shareModal"),
      canvas: document.getElementById("qrCanvas"),
      url: document.getElementById("shareUrl"),
      close: document.getElementById("shareClose"),
      copy: document.getElementById("shareCopy"),
    };
    function shareTarget() {
      // 로컬(file:// 등)에서 열렸으면 배포 주소를 대신 사용
      return /^https?:$/.test(location.protocol) ? location.href : DEPLOY_URL;
    }
    function openShare() {
      const url = shareTarget();
      shareEl.url.textContent = url;
      try { drawQrToCanvas(shareEl.canvas, url); }
      catch (e) { console.error(e); shareEl.url.textContent = url + " (QR 생성 실패)"; }
      shareEl.modal.hidden = false;
    }
    function closeShare() { shareEl.modal.hidden = true; }
    shareEl.btn.addEventListener("click", openShare);
    shareEl.close.addEventListener("click", closeShare);
    shareEl.modal.addEventListener("click", (e) => { if (e.target === shareEl.modal) closeShare(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !shareEl.modal.hidden) closeShare(); });
    shareEl.copy.addEventListener("click", async () => {
      const url = shareEl.url.textContent;
      let ok = false;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(url); ok = true; }
      } catch (e) { ok = false; }
      if (!ok) {
        const inp = document.createElement("input");
        inp.value = url;
        document.body.appendChild(inp);
        inp.select(); inp.setSelectionRange(0, 99999);
        try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
        document.body.removeChild(inp);
      }
      const prev = shareEl.copy.textContent;
      shareEl.copy.textContent = ok ? "복사됨 ✓" : "복사 실패";
      setTimeout(() => { shareEl.copy.textContent = prev; }, 1500);
    });

    /* ===== 앱 설치 유도 ===== */
    const installEl = {
      btn: document.getElementById("installBtn"),
      modal: document.getElementById("installModal"),
      steps: document.getElementById("installSteps"),
      close: document.getElementById("installClose"),
      toast: document.getElementById("installToast"),
      toastMsg: document.getElementById("installToastMsg"),
    };
    let deferredPrompt = null;

    function isStandalone() {
      return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
        || window.navigator.standalone === true;
    }
    function refreshInstallBtn() { installEl.btn.hidden = isStandalone(); }

    // 지원 브라우저: 설치 가능 시점에 이벤트 저장
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      refreshInstallBtn();
    });
    // 설치 완료
    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      installEl.btn.hidden = true;
      showInstallToast("설치되었습니다 ✓");
    });

    let installToastTimer = null;
    function showInstallToast(msg) {
      clearTimeout(installToastTimer);
      installEl.toastMsg.textContent = msg;
      installEl.toast.hidden = false;
      installToastTimer = setTimeout(() => { installEl.toast.hidden = true; }, 2500);
    }

    // 환경 감지
    function detectPlatform() {
      const ua = navigator.userAgent || "";
      if (/iphone|ipad|ipod/i.test(ua)) return "ios";
      if (/android/i.test(ua)) return "android";
      return "other";
    }

    // 인라인 SVG 아이콘
    const SVG = {
      share: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 12v7a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-7"/></svg>',
      plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3.5"/><path d="M12 9v6M9 12h6"/></svg>',
      dots: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="19" r="1.7"/></svg>',
    };

    function buildSteps(platform) {
      let steps;
      if (platform === "ios") {
        steps = [
          [SVG.share, '화면 <b>하단의 공유 버튼</b>(⬆️)을 누르세요.'],
          [SVG.plus, '메뉴를 내려 <b>“홈 화면에 추가”</b>를 누르세요.'],
        ];
      } else if (platform === "android") {
        steps = [
          [SVG.dots, '오른쪽 위 <b>메뉴(⋮ 또는 ≡)</b>를 누르세요.'],
          [SVG.plus, '목록에서 <b>“홈 화면에 추가”</b>를 누르세요.'],
        ];
      } else {
        steps = [
          [SVG.dots, '브라우저 <b>메뉴</b>를 누르세요.'],
          [SVG.plus, '<b>“홈 화면에 추가”</b> 또는 <b>“다운로드”</b>를 누르세요.'],
        ];
      }
      const ol = document.createElement("ol");
      ol.className = "install-steps";
      steps.forEach((s, i) => {
        const li = document.createElement("li");
        li.innerHTML = '<span class="step-num">' + (i + 1) + '</span>'
          + '<span class="step-ico">' + s[0] + '</span>'
          + '<span class="step-txt">' + s[1] + '</span>';
        ol.appendChild(li);
      });
      const hint = document.createElement("p");
      hint.className = "install-hint";
      hint.textContent = "추가하면 홈 화면 아이콘으로 바로 열 수 있어요.";
      installEl.steps.innerHTML = "";
      installEl.steps.appendChild(ol);
      installEl.steps.appendChild(hint);
    }

    function openInstallModal() {
      buildSteps(detectPlatform());
      installEl.modal.hidden = false;
    }
    function closeInstallModal() { installEl.modal.hidden = true; }

    installEl.btn.addEventListener("click", async () => {
      if (deferredPrompt) {
        // 지원 브라우저: 브라우저 기본 설치창
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch (e) {}
        deferredPrompt = null;
        return;
      }
      // 미지원(삼성 인터넷·iOS 사파리 등): 그림 안내
      openInstallModal();
    });
    installEl.close.addEventListener("click", closeInstallModal);
    installEl.modal.addEventListener("click", (e) => { if (e.target === installEl.modal) closeInstallModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !installEl.modal.hidden) closeInstallModal(); });

    refreshInstallBtn();
    if (window.matchMedia) {
      const mq = window.matchMedia("(display-mode: standalone)");
      if (mq.addEventListener) mq.addEventListener("change", refreshInstallBtn);
    }

    /* ===== 데이터 백업(내보내기/가져오기) ===== */
    const backupEl = {
      export: document.getElementById("exportBtn"),
      import: document.getElementById("importBtn"),
      file: document.getElementById("importFile"),
    };

    // 내보내기: 전체 state(할 일+카테고리+설정)를 날짜 포함 파일명으로 다운로드
    backupEl.export.addEventListener("click", () => {
      const json = JSON.stringify(state, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `todo-backup-${todayStr()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showInstallToast("백업을 내보냈어요 ✓");
    });

    // 가져오기: 파일 선택 → 형식 검증 → 확인 → 복원
    backupEl.import.addEventListener("click", () => backupEl.file.click());
    backupEl.file.addEventListener("change", () => {
      const f = backupEl.file.files && backupEl.file.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        let parsed = null;
        try { parsed = JSON.parse(reader.result); } catch (e) { parsed = null; }
        // 형식 검증(안 맞으면 기존 데이터는 손대지 않음)
        const valid = parsed && Array.isArray(parsed.categories) && parsed.categories.length >= 1
          && Array.isArray(parsed.tasks);
        if (!valid) {
          backupEl.file.value = "";
          showInstallToast("올바른 백업 파일이 아니에요");
          return;
        }
        confirmDialog("현재 데이터를 불러온 파일로 덮어씁니다. 계속할까요?",
          { heading: "백업 가져오기", okLabel: "덮어쓰기", okClass: "btn-primary" }
        ).then((ok) => {
          backupEl.file.value = "";
          if (!ok) return;
          state = parsed;
          if (!state.selectedDate) state.selectedDate = todayStr();
          save();
          calView = monthOf(state.selectedDate);
          refreshCategoryUI();
          render();
          showInstallToast("백업을 불러왔어요 ✓");
        });
      };
      reader.onerror = () => { backupEl.file.value = ""; showInstallToast("파일을 읽지 못했어요"); };
      reader.readAsText(f);
    });

    /* ===== 다가온 할 일 알림(앱 열 때 1회) ===== */
    const REMINDER_OFFSET = { "7d": 7, "3d": 3, "1d": 1, "today": 0 };

    // 등록 날짜(date)가 오늘로부터 며칠 뒤인지(음수=지난날)
    function daysUntil(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const target = new Date(y, m - 1, d); target.setHours(0, 0, 0, 0);
      const now = new Date(); now.setHours(0, 0, 0, 0);
      return Math.round((target - now) / 86400000);
    }

    // 알림 조건에 걸린 미완료 할 일 수집(가까운 순)
    function collectDueTasks() {
      const out = [];
      state.tasks.forEach((t) => {
        if (t.status === "done") return;
        const rem = Array.isArray(t.reminders) ? t.reminders : [];
        if (rem.length === 0) return;
        const dd = daysUntil(t.date);
        if (dd < 0) return; // 이미 지난 날짜는 '다가온 할 일' 아님
        if (rem.some((r) => REMINDER_OFFSET[r] === dd)) out.push({ task: t, dd });
      });
      out.sort((a, b) => a.dd - b.dd);
      return out;
    }

    function buildAlertList(due) {
      el.alertList.innerHTML = "";
      due.forEach(({ task, dd }) => {
        const cat = getCategory(task.categoryId);
        const item = document.createElement("div");
        item.className = "alert-item";
        const title = document.createElement("div");
        title.className = "ai-title";
        title.textContent = task.title;
        item.appendChild(title);
        const meta = document.createElement("div");
        meta.className = "ai-meta";
        const when = document.createElement("span");
        when.className = "ai-when";
        when.textContent = dd === 0 ? "오늘" : `${dd}일 뒤`;
        meta.appendChild(when);
        if (cat) {
          const chip = document.createElement("span");
          chip.className = "cat-chip";
          chip.textContent = cat.name;
          chip.style.background = cat.color;
          meta.appendChild(chip);
        }
        const date = document.createElement("span");
        date.textContent = task.date;
        meta.appendChild(date);
        item.appendChild(meta);
        el.alertList.appendChild(item);
      });
    }

    function maybeShowAlerts() {
      const due = collectDueTasks();
      if (due.length === 0) return;                       // 걸린 게 없으면 안 띄움
      if (state.alertLastShown === todayStr()) return;    // '오늘 하루 안 보기' 적용됨
      buildAlertList(due);
      el.alertSkipToday.checked = false;
      el.alertModal.hidden = false;
    }
    function closeAlert() {
      if (el.alertSkipToday.checked) { state.alertLastShown = todayStr(); save(); }
      el.alertModal.hidden = true;
    }
    el.alertClose.addEventListener("click", closeAlert);
    el.alertModal.addEventListener("click", (e) => { if (e.target === el.alertModal) closeAlert(); });

    /* 첫 렌더 */
    refreshCategoryUI();   // 범례 + 관리 목록
    render();
    maybeShowAlerts();     // 앱 열 때 다가온 할 일 팝업

    // 디버깅/다음 단계 연동을 위해 노출
    window.TodoApp = {
      STORAGE_KEY, uid, load, save, render,
      addTask, updateTask, deleteTask, setStatus,
      addCategory, updateCategory, deleteCategory, tasksInCategory,
      get state() { return state; },
    };
  </script>

  <!-- PWA 서비스워커 등록(상대경로 — /todolist/ 하위에서 정상 등록) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW 등록 실패", e));
      });
    }
  </script>
