<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do</title>
  <style>
    /* ===== 디자인 토큰 ===== */
    :root {
      /* 배경 */
      --bg: #FFFFFF;
      --bg-soft: #FAFBFD;

      /* 잉크(텍스트) */
      --ink: #1F2433;
      --ink-2: #5B6478;
      --ink-3: #9AA2B4;

      /* 강조 */
      --accent: #5B6CFF;

      /* 카테고리 파스텔 */
      --cat-work: #C7E0FF;   /* 업무(기타 회색과 구분되도록 또렷한 하늘색) */
      --cat-life: #FFF1C2;   /* 일상 */
      --cat-study: #FFE0EC;  /* 공부 */
      --cat-etc: #E8ECF2;    /* 기타 */

      /* 보더 / 그림자 */
      --line: #EDF0F5;
      --shadow: 0 1px 2px rgba(31, 36, 51, 0.04), 0 8px 24px rgba(31, 36, 51, 0.05);

      /* 라운드 */
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;

      /* 간격 */
      --gap: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: var(--bg-soft);
      color: var(--ink);
      /* 한글 가독성: 시스템 한글 폰트 폴백 + 넉넉한 줄간 */
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
                   "Malgun Gothic", "맑은 고딕", system-ui, -apple-system,
                   "Segoe UI", Roboto, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* ===== 레이아웃 골격 ===== */
    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* 상단 바 */
    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      white-space: nowrap;
    }

    .brand .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    .search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      color: var(--ink-3);
      font-size: 14px;
    }

    .search input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    .search input::placeholder { color: var(--ink-3); }

    /* 상단바 좌측: 브랜드 + 카테고리 범례 + 관리 */
    .topbar-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .cat-legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    /* 카테고리 칩: 배경 = 각 카테고리 색(인라인), 글자는 진한 톤 */
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      background: var(--bg-soft);
      border: 1px solid rgba(31, 36, 51, 0.06);
      border-radius: 999px;
      padding: 3px 12px;
    }
    /* 'Category' 라벨: 그룹 제목(.column-head h2)과 동일한 크기·색·굵기 */
    .legend-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }
    /* 칩(카테고리 항목)과 관리(동작) 버튼 사이 구분선 */
    .legend-sep {
      width: 1px;
      align-self: stretch;
      min-height: 18px;
      background: var(--line);
      margin: 0 2px 0 6px;
    }
    /* [관리] 버튼: 카테고리 칩과 동일 크기(.btn 기본값을 이기도록 특이도 ↑) */
    .btn.manage-btn { font-size: 12px; font-weight: 600; padding: 3px 10px; margin-left: 4px; }

    /* 달력 중앙 정렬 */
    .calendar-center {
      display: flex;
      justify-content: center;
    }
    .cal-panel {
      width: 340px;
      max-width: 100%;
    }

    .panel {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .panel-title {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-2);
      letter-spacing: 0.02em;
    }

    /* 보드: 세로 스택(할 일 → 진행중 → 완료) */
    .board {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .column {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
    }

    .column-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .column-head .head-spacer { flex: 1; }
    /* [+ 추가] 버튼: 카테고리 칩과 동일 크기(.btn 기본값을 이기도록 특이도 ↑) */
    .btn.add-task-btn { font-size: 12px; font-weight: 600; padding: 3px 10px; }

    .column-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .column-head .count {
      font-size: 12px;
      color: var(--ink-3);
      background: var(--bg-soft);
      border-radius: 999px;
      padding: 1px 9px;
    }

    /* 그룹 제목 앞 아이콘(이모지) */
    .group-icon {
      font-size: 15px;
      line-height: 1;
    }

    .column-body {
      flex: 1;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-3);
      font-size: 13px;
      padding: 16px;
      text-align: center;
    }

    /* ===== 입력 필드 ===== */
    .field {
      font: inherit;
      color: var(--ink);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      outline: 0;
    }
    .field::placeholder { color: var(--ink-3); }
    .field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 108, 255, 0.12);
    }
    .field.invalid {
      border-color: #FFB4C4;
      box-shadow: 0 0 0 3px rgba(255, 180, 196, 0.25);
    }

    select.field { cursor: pointer; }

    .btn {
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      padding: 9px 16px;
      transition: filter .12s ease, background .12s ease;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost {
      background: var(--bg-soft);
      color: var(--ink-2);
      border-color: var(--line);
    }
    .btn-ghost:hover { background: #F1F3F8; }

    /* ===== 카드 목록 ===== */
    .card-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 전폭 한 줄 카드: [번호] [컨트롤] [제목+상세] [수정/삭제] — 세로 중앙 정렬 통일 */
    .card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      box-shadow: 0 1px 2px rgba(31, 36, 51, 0.04);
      transition: box-shadow .12s ease, opacity .12s ease;
      cursor: grab;
      touch-action: none; /* 터치 드래그 시 스크롤 가로채기 방지 */
    }
    .card:hover { box-shadow: var(--shadow); }
    .card:active { cursor: grabbing; }

    /* 좌측: 상태 컨트롤(완료/진행중) */
    .card-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }
    .card-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* 그룹 내 순서 번호(각 그룹 1부터) — 약 2배 크기, 옅은 회색 */
    .card-no {
      font-size: 24px;
      font-weight: 700;
      color: var(--ink-3);
      min-width: 1.4em;
      text-align: right;
      flex: 0 0 auto;
      align-self: center;
      line-height: 1.1;
    }

    /* 가운데: 제목 + 상세(말줄임 금지, 줄바꿈 허용) */
    .card-main { flex: 1 1 auto; min-width: 0; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      word-break: break-word;
    }
    .card-memo {
      font-size: 12.5px;
      color: var(--ink-2);
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 완료 카드: 취소선 + 흐림 */
    .card.is-done { opacity: 0.55; background: var(--bg-soft); }
    .card.is-done .card-title { text-decoration: line-through; color: var(--ink-3); }
    .card.is-done .card-memo { text-decoration: line-through; }

    /* 우측: 수정/삭제(항상 노출) */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .cat-chip {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-2);
      border-radius: 999px;
      padding: 2px 10px;
      white-space: nowrap;
    }

    /* 상태 컨트롤: 연하게 — 시각 우선순위는 제목·내용에 둠 */
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-3);
      cursor: pointer;
      user-select: none;
    }
    /* 체크박스: 테두리·체크배경을 동일한 연회색(#C9CFDA)으로 통일, 체크 표시는 차분한 회색 */
    .toggle input {
      appearance: none;
      -webkit-appearance: none;
      margin: 0;
      width: 14px;
      height: 14px;
      border: 1.5px solid #C9CFDA;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      position: relative;
    }
    .toggle input:checked {
      background: #C9CFDA;
      border-color: #C9CFDA;
    }
    .toggle input:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 3px;
      height: 7px;
      border: solid #5B6478;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    .icon-btn {
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      border: 0;
      color: var(--ink-3);
      padding: 2px 4px;
      border-radius: 6px;
    }
    .icon-btn:hover { color: var(--ink); background: var(--bg-soft); }
    .icon-btn.danger:hover { color: #E0567A; }

    /* 빈 상태 */
    .empty {
      flex: 1;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-3);
      font-size: 13px;
      padding: 24px 16px;
      text-align: center;
      min-height: 120px;
    }

    /* ===== 수정 모달 ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(31, 36, 51, 0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    .modal-backdrop[hidden] { display: none; }

    .modal {
      width: 100%;
      max-width: 440px;
      background: var(--bg);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(31, 36, 51, 0.22);
      padding: 22px 24px;
    }
    .modal h3 { margin: 0 0 16px; font-size: 17px; }
    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
      margin-bottom: 14px;
    }
    .modal label .field { width: 100%; margin-top: 5px; }
    .modal textarea.field { resize: vertical; min-height: 78px; line-height: 1.6; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 6px;
    }

    /* ===== 되돌리기 토스트 ===== */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--ink);
      color: #fff;
      border-radius: var(--radius-md);
      box-shadow: 0 12px 32px rgba(31, 36, 51, 0.28);
      padding: 12px 18px;
      font-size: 13.5px;
      z-index: 60;
    }
    .toast[hidden] { display: none; }
    .toast button {
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      border: 0;
      color: #B9C2FF;
      padding: 2px 4px;
    }
    .toast button:hover { color: #fff; }

    /* 카테고리 관리 목록 */
    .cat-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--bg-soft);
    }
    .cat-row .dot {
      width: 14px;
      height: 14px;
      border-radius: 5px;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(31, 36, 51, 0.06);
    }
    .cat-row .name {
      flex: 1;
      font-size: 13.5px;
      font-weight: 600;
      word-break: break-word;
    }
    .icon-btn:disabled {
      opacity: 0.32;
      cursor: not-allowed;
    }
    .icon-btn:disabled:hover { color: var(--ink-3); background: transparent; }
    .add-cat-btn {
      margin-top: 12px;
      width: 100%;
    }

    /* 팔레트 선택 */
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-2);
      margin-bottom: 8px;
    }
    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .swatch-btn {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      box-shadow: inset 0 0 0 1px rgba(31, 36, 51, 0.07);
      transition: transform .1s ease;
    }
    .swatch-btn:hover { transform: scale(1.06); }
    .swatch-btn[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(31, 36, 51, 0.07), 0 0 0 3px rgba(91, 108, 255, 0.14);
    }

    /* 위험 버튼 / 확인 메시지 */
    .btn-danger { background: #E0567A; color: #fff; }
    .btn-danger:hover { filter: brightness(1.05); }
    .confirm-msg {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.7;
      margin: 0 0 20px;
    }
    .confirm-msg strong { color: var(--ink); }

    /* ===== 드래그 앤 드롭 ===== */
    /* 드래그 중인 플로팅 카드 — 기울임·확대 없이 원래 직사각형 그대로, 투명도만 */
    .card.dragging-card {
      position: fixed;
      z-index: 80;
      pointer-events: none;
      margin: 0;
      cursor: grabbing;
      opacity: 0.9;
      box-shadow: 0 18px 40px rgba(31, 36, 51, 0.22);
    }

    /* 놓일 위치 자리 표시 */
    .drag-placeholder {
      border: 2px dashed var(--accent);
      background: rgba(91, 108, 255, 0.06);
      border-radius: var(--radius-md);
      box-sizing: border-box;
    }

    /* 드래그 중: 텍스트 선택 방지, 빈 상태 숨김, 대상 칸 하이라이트 */
    .board.dragging { user-select: none; }
    .board.dragging .empty { display: none; }
    /* 빈 그룹도 드롭 가능하도록 최소 높이 확보 */
    .board.dragging .card-list { min-height: 64px; }
    .board.dragging .card-list.drop-active {
      background: rgba(91, 108, 255, 0.05);
      border-radius: var(--radius-md);
    }

    /* ===== 달력 ===== */
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-title { font-weight: 700; font-size: 14.5px; }
    .cal-nav {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--ink-2);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-nav:hover { background: #F1F3F8; color: var(--ink); }

    .cal-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }
    .cal-week span {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-3);
      padding: 2px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 12.5px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s ease;
    }
    .cal-cell:hover { background: var(--bg-soft); }
    .cal-cell.muted { color: var(--ink-3); opacity: 0.5; }
    .cal-cell.today {
      font-weight: 800;
      color: var(--accent);
      box-shadow: inset 0 0 0 1.5px var(--accent);
    }
    .cal-cell.selected {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      box-shadow: none;
    }
    .cal-dot {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }
    .cal-cell.selected .cal-dot { background: #fff; }

    /* ===== 전체 검색 (작은 고정 폭, 우측) ===== */
    .search-wrap { position: relative; flex: 0 0 260px; width: 260px; max-width: 40%; }
    .search { width: 100%; }
    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      max-height: 60vh;
      overflow-y: auto;
      z-index: 40;
      padding: 6px;
    }
    .search-results[hidden] { display: none; }
    .sr-item {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      cursor: pointer;
      font: inherit;
    }
    .sr-item:hover { background: var(--bg-soft); }
    .sr-title { font-size: 13.5px; font-weight: 600; color: var(--ink); }
    .sr-title.done { text-decoration: line-through; color: var(--ink-3); }
    .sr-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 5px;
      font-size: 11.5px;

    .sr-status {
      background: var(--bg-soft);

      border-radius: 999px;
      padding: 1px 9px;
      color: var(--ink-2);
    }
    .sr-date { color: var(--ink-3); }
    .search-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--ink-3);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ===== 접근성: 항상 보이는 포커스 링 ===== */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .cal-cell:focus-visible,
    .sr-item:focus-visible {
      outline-offset: -2px;
    }

    /* 모션 최소화 선호 존중 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
      .card.dragging-card { transform: none !important; }
    }

    @media (max-width: 560px) {
      .search-wrap { flex: 0 0 150px; width: 150px; }
      .card-actions { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- ① 맨 위: 달력 (가운데 정렬) -->
    <section class="calendar-center">
      <div class="panel cal-panel">

    <!-- ② 카테고리 라벨 + 색 범례 + 관리 (좌) / 검색 (우) -->
    <header class="topbar">

        <div class="search-results" id="searchResults" role="listbox" hidden></div>

    <!-- ③ 하단: 할 일 → 진행중 → 완료 (전폭 한 줄 카드, 항상 펼침) -->
    <section class="board" id="board">
      <div class="column" data-status="todo">

  <!-- 할 일 추가/수정 모달 -->

          <textarea class="field" id="editMemo" placeholder="상세 내용 (선택)"></textarea>
        </label>
        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" id="editCancel">취소</button>
          <button class="btn btn-primary" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 카테고리 관리 모달 (목록 + 추가 진입) -->
  <div class="modal-backdrop" id="manageModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="manageHeading">
      <h3 id="manageHeading">카테고리 관리</h3>
      <div class="cat-list" id="catList"></div>
      <button class="btn btn-ghost add-cat-btn" type="button" id="addCatBtn">+ 카테고리 추가</button>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" id="manageClose">닫기</button>
      </div>
    </div>
  </div>

  <!-- 카테고리 추가/수정 모달 -->
  <div class="modal-backdrop" id="categoryModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="categoryHeading">
      <h3 id="categoryHeading">카테고리 추가</h3>
      <form id="categoryForm">
        <label>이름
          <input class="field" type="text" id="categoryName" placeholder="카테고리 이름" />
        </label>
        <span class="field-label">색 (팔레트에서 선택)</span>
        <div class="palette" id="palette"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" id="categoryCancel">취소</button>
          <button class="btn btn-primary" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-backdrop" id="confirmModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmHeading">
      <h3 id="confirmHeading">삭제 확인</h3>
      <p class="confirm-msg" id="confirmMessage"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" id="confirmCancel">취소</button>
        <button class="btn btn-danger" type="button" id="confirmOk">삭제</button>
      </div>
    </div>
  </div>

  <!-- 되돌리기 토스트 -->
  <div class="toast" id="toast" hidden>
    <span id="toastMsg"></span>
    <button type="button" id="toastUndo">되돌리기</button>
  </div>

  <script>
    "use strict";

    /* =========================================================
     * 데이터 계층 (Step 1)
     * 스키마
     *   Category { id, name, color, order }
     *   Task     { id, title, memo, categoryId,
     *              status('todo'|'doing'|'done'),
     *              date('YYYY-MM-DD'), order, createdAt, updatedAt }
     * ========================================================= */

    const STORAGE_KEY = "todoapp.v1";

    /* id 생성기: crypto.randomUUID 우선, 미지원 환경 폴백 */
    function uid() {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }
      // 폴백: RFC4122 v4 형태의 유사 UUID
      if (typeof crypto !== "undefined" && typeof crypto.getRandomValues === "function") {
        const b = crypto.getRandomValues(new Uint8Array(16));
        b[6] = (b[6] & 0x0f) | 0x40;
        b[8] = (b[8] & 0x3f) | 0x80;
        const h = [...b].map((x) => x.toString(16).padStart(2, "0"));
        return `${h[0]}${h[1]}${h[2]}${h[3]}-${h[4]}${h[5]}-${h[6]}${h[7]}-${h[8]}${h[9]}-${h[10]}${h[11]}${h[12]}${h[13]}${h[14]}${h[15]}`;
      }
      // 최후 폴백
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }

    /* 오늘 날짜를 'YYYY-MM-DD'(로컬 기준)로 반환 */
    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    /* 기본 카테고리 4종 시드 */
    function defaultCategories() {
      return [
        { id: uid(), name: "업무", color: "#C7E0FF", order: 0 },
        { id: uid(), name: "일상", color: "#FFF1C2", order: 1 },
        { id: uid(), name: "공부", color: "#FFE0EC", order: 2 },
        { id: uid(), name: "기타", color: "#E8ECF2", order: 3 },
      ];
    }

    /* 앱 상태 (메모리) */
    let state = null;

    /* localStorage 읽기 */
    function load() {
      let parsed = null;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) parsed = JSON.parse(raw);
      } catch (e) {
        console.warn("저장 데이터를 읽지 못했습니다. 새로 초기화합니다.", e);
        parsed = null;
      }

      if (parsed && Array.isArray(parsed.categories) && Array.isArray(parsed.tasks)) {
        state = parsed;
        // selectedDate 누락 방어
        if (!state.selectedDate) state.selectedDate = todayStr();
        // 업무 기존 하늘색(#DCEBFF)을 또렷한 하늘색(#C7E0FF)으로 1회 마이그레이션
        let migrated = false;
        state.categories.forEach((c) => {
          if ((c.color || "").toUpperCase() === "#DCEBFF") { c.color = "#C7E0FF"; migrated = true; }
        });
        if (migrated) save();
      } else {
        // 최초 실행: 기본값 생성 후 즉시 저장
        state = {
          version: 1,
          categories: defaultCategories(),
          tasks: [],
          selectedDate: todayStr(),
        };
        save();
      }
      return state;
    }

    /* localStorage 쓰기 — 모든 데이터 변경 시 즉시 호출 */
    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error("저장에 실패했습니다.", e);
      }
    }

    /* 초기화 */
    load();

    /* =========================================================
     * 데이터 조작 헬퍼 (Step 2)
     * 모든 변경은 즉시 save() 후 render() 한다.
     * ========================================================= */

    const STATUSES = ["todo", "doing", "done"];

    function nowISO() { return new Date().toISOString(); }

    function getCategory(id) {
      return state.categories.find((c) => c.id === id) || null;
    }

    /* selectedDate에 속한 할 일만 */
    function tasksForDate(date) {
      return state.tasks.filter((t) => t.date === date);
    }

    /* 특정 상태/날짜 그룹의 다음 order(최하단) */
    function nextOrder(status, date) {
      const peers = state.tasks.filter((t) => t.status === status && t.date === date);
      return peers.reduce((max, t) => Math.max(max, t.order), -1) + 1;
    }

    /* 추가: status='todo'로 해당 날짜 '할 일' 최하단에 */
    function addTask({ title, memo, categoryId, date }) {
      const t = {
        id: uid(),
        title: title.trim(),
        memo: (memo || "").trim(),
        categoryId: categoryId,
        status: "todo",
        date: date,
        order: nextOrder("todo", date),
        createdAt: nowISO(),
        updatedAt: nowISO(),
      };
      state.tasks.push(t);
      save();
      render();
      return t;
    }

    /* 수정: 제목·상세·카테고리·날짜 편집 */
    function updateTask(id, patch) {
      const t = state.tasks.find((x) => x.id === id);
      if (!t) return;
      // 날짜가 바뀌면 '할 일' 기준으로 위치 재배치
      if (patch.date && patch.date !== t.date) {
        t.order = nextOrder(t.status, patch.date);
      }
      if (patch.title !== undefined) t.title = patch.title.trim();
      if (patch.memo !== undefined) t.memo = patch.memo.trim();
      if (patch.categoryId !== undefined) t.categoryId = patch.categoryId;
      if (patch.date !== undefined) t.date = patch.date;
      t.updatedAt = nowISO();
      save();
      render();
    }

    /* 삭제(되돌리기용으로 삭제된 항목 반환) */
    function deleteTask(id) {
      const idx = state.tasks.findIndex((x) => x.id === id);
      if (idx === -1) return null;
      const [removed] = state.tasks.splice(idx, 1);
      save();
      render();
      return removed;
    }

    /* 되돌리기: 삭제했던 task 객체를 그대로 복원 */
    function restoreTask(task) {
      if (!task) return;
      state.tasks.push(task);
      save();
      render();
    }

    /* 상태 전환: 대상 섹션 최하단으로 이동(order 갱신) */
    function setStatus(id, status) {
      const t = state.tasks.find((x) => x.id === id);
      if (!t || t.status === status) return;
      t.status = status;
      t.order = nextOrder(status, t.date);
      t.updatedAt = nowISO();
      save();
      render();
    }

    /* ----- 카테고리 ----- */

    /* 사전 정의된 파스텔 팔레트(톤 일관성 유지 — 임의 색 입력 금지) */
    const PALETTE = [
      "#DCEBFF", // 블루
      "#FFF1C2", // 옐로
      "#FFE0EC", // 핑크
      "#E8ECF2", // 그레이
      "#DDF3E4", // 민트
      "#EADCFF", // 라벤더
      "#FFE6D2", // 피치
      "#D6F1F5", // 스카이
    ];

    function nextCategoryOrder() {
      return state.categories.reduce((max, c) => Math.max(max, c.order), -1) + 1;
    }

    /* 해당 카테고리에 속한 할 일들 */
    function tasksInCategory(id) {
      return state.tasks.filter((t) => t.categoryId === id);
    }

    function addCategory(name, color) {
      const c = { id: uid(), name: name.trim(), color, order: nextCategoryOrder() };
      state.categories.push(c);
      save();
      refreshCategoryUI();
      return c;
    }

    /* 수정: 색을 바꾸면 카드는 렌더 시 getCategory().color를 참조하므로 자동 갱신 */
    function updateCategory(id, patch) {
      const c = getCategory(id);
      if (!c) return;
      if (patch.name !== undefined) c.name = patch.name.trim();
      if (patch.color !== undefined) c.color = patch.color;
      save();
      refreshCategoryUI();
      render(); // 소속 할 일의 색·카테고리명 즉시 반영
    }

    /* 삭제: 소속 할 일도 함께 삭제. 최소 1개는 남겨야 함 */
    function deleteCategory(id) {
      if (state.categories.length <= 1) return false;
      state.tasks = state.tasks.filter((t) => t.categoryId !== id);
      state.categories = state.categories.filter((c) => c.id !== id);
      save();
      refreshCategoryUI();
      render();
      return true;
    }

    /* =========================================================
     * UI 렌더 계층
     * ========================================================= */

    const el = {
      addTaskBtn: document.getElementById("addTaskBtn"),
      board: document.querySelector(".board"),
      lists: {
        todo: document.getElementById("list-todo"),
        doing: document.getElementById("list-doing"),
        done: document.getElementById("list-done"),
      },
      counts: {
        todo: document.getElementById("count-todo"),
        doing: document.getElementById("count-doing"),
        done: document.getElementById("count-done"),
      },
      editModal: document.getElementById("editModal"),
      editForm: document.getElementById("editForm"),
      editHeading: document.getElementById("editHeading"),
      editTitle: document.getElementById("editTitle"),
      editCategory: document.getElementById("editCategory"),
      editDate: document.getElementById("editDate"),
      editMemo: document.getElementById("editMemo"),
      editCancel: document.getElementById("editCancel"),
      toast: document.getElementById("toast"),
      toastMsg: document.getElementById("toastMsg"),
      toastUndo: document.getElementById("toastUndo"),
      // 카테고리 범례 + 관리
      catLegend: document.getElementById("catLegend"),
      manageCatBtn: document.getElementById("manageCatBtn"),
      manageModal: document.getElementById("manageModal"),
      manageClose: document.getElementById("manageClose"),
      catList: document.getElementById("catList"),
      addCatBtn: document.getElementById("addCatBtn"),
      categoryModal: document.getElementById("categoryModal"),
      categoryForm: document.getElementById("categoryForm"),
      categoryHeading: document.getElementById("categoryHeading"),
      categoryName: document.getElementById("categoryName"),
      categoryCancel: document.getElementById("categoryCancel"),
      palette: document.getElementById("palette"),
      // 삭제 확인
      confirmModal: document.getElementById("confirmModal"),
      confirmMessage: document.getElementById("confirmMessage"),
      confirmOk: document.getElementById("confirmOk"),
      confirmCancel: document.getElementById("confirmCancel"),
      // 달력
      calTitle: document.getElementById("calTitle"),
      calGrid: document.getElementById("calGrid"),
      calPrev: document.getElementById("calPrev"),
      calNext: document.getElementById("calNext"),
      // 검색
      searchInput: document.getElementById("searchInput"),
      searchResults: document.getElementById("searchResults"),
    };

    const STATUS_LABEL = { todo: "할 일", doing: "진행중", done: "완료" };

    const EMPTY_TEXT = {
      todo: "할 일을 추가해 보세요",
      doing: "여기서 진행 중인 일을 모아 보세요",
      done: "완료하면 여기에 쌓여요",
    };

    /* 카테고리 <select> 옵션 채우기 */
    function fillCategoryOptions(selectEl, selectedId) {
      selectEl.innerHTML = "";
      state.categories
        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c.id;
          opt.textContent = c.name;
          if (c.id === selectedId) opt.selected = true;
          selectEl.appendChild(opt);
        });
    }

    /* hex 색을 흰색과 섞어 옅게(ratio=색 비율, 작을수록 흰색에 가까움) */
    function tintColor(hex, ratio) {
      const m = /^#?([0-9a-f]{6})$/i.exec(hex || "");
      if (!m) return null;
      const n = parseInt(m[1], 16);
      const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      const mix = (ch) => Math.round(255 + (ch - 255) * ratio);
      return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
    }

    /* 카드 한 장 생성 — 전폭 한 줄: [번호][컨트롤][제목+상세][수정/삭제] */
    function createCard(t, num) {
      const cat = getCategory(t.categoryId);
      const card = document.createElement("div");
      card.className = "card" + (t.status === "done" ? " is-done" : "");
      card.dataset.id = t.id;
      // 카드 배경 = 카테고리 색의 옅은 파스텔(흰색과 혼합해 톤다운)
      if (cat) card.style.background = tintColor(cat.color, 0.5);

      // ── 그룹 내 순서 번호(1부터) ──
      const no = document.createElement("span");
      no.className = "card-no";
      no.textContent = num;
      card.appendChild(no);

      // ── 좌측: 상태 컨트롤(완료, 진행중) — 색 점 제거 ──
      const left = document.createElement("div");
      left.className = "card-left";

      const controls = document.createElement("div");
      controls.className = "card-controls";

      // 완료 체크박스
      const doneLabel = document.createElement("label");
      doneLabel.className = "toggle";
      const done = document.createElement("input");
      done.type = "checkbox";
      done.dataset.action = "done";
      done.checked = t.status === "done";
      doneLabel.appendChild(done);
      doneLabel.appendChild(document.createTextNode("완료"));
      controls.appendChild(doneLabel);

      // 진행중 토글
      const doingLabel = document.createElement("label");
      doingLabel.className = "toggle";
      const doing = document.createElement("input");
      doing.type = "checkbox";
      doing.dataset.action = "doing";
      doing.checked = t.status === "doing";
      doingLabel.appendChild(doing);
      doingLabel.appendChild(document.createTextNode("진행중"));
      controls.appendChild(doingLabel);

      left.appendChild(controls);
      card.appendChild(left);

      // ── 가운데: 제목 + 상세(줄바꿈 허용, 말줄임 없음) ──
      const main = document.createElement("div");
      main.className = "card-main";
      const title = document.createElement("div");
      title.className = "card-title";
      title.textContent = t.title;
      main.appendChild(title);
      if (t.memo) {
        const memo = document.createElement("div");
        memo.className = "card-memo";
        memo.textContent = t.memo;
        main.appendChild(memo);
      }
      card.appendChild(main);

      // ── 우측: 수정 / 삭제(항상 노출) ──
      const actions = document.createElement("div");
      actions.className = "card-actions";

      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "icon-btn";
      editBtn.dataset.action = "edit";
      editBtn.textContent = "수정";
      actions.appendChild(editBtn);

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "icon-btn danger";
      delBtn.dataset.action = "delete";
      delBtn.textContent = "삭제";
      actions.appendChild(delBtn);

      card.appendChild(actions);
      return card;
    }

    /* 전체 렌더 */
    function render() {
      const list = tasksForDate(state.selectedDate);
      STATUSES.forEach((status) => {
        const container = el.lists[status];
        const items = list
          .filter((t) => t.status === status)
          .sort((a, b) => a.order - b.order);
        el.counts[status].textContent = items.length;
        container.innerHTML = "";
        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = EMPTY_TEXT[status];
          container.appendChild(empty);
        } else {
          // 그룹 내부에서 1부터 번호 부여(정렬 순서 기준)
          items.forEach((t, i) => container.appendChild(createCard(t, i + 1)));
        }
      });
      renderCalendar();                       // 날짜별 점 표시 최신화
      if (searchActive()) renderSearch(el.searchInput.value); // 검색 열린 상태면 갱신
    }

    /* ===== 카테고리 관리 UI ===== */

    /* 카테고리 목록 패널 렌더 */

      const wrap = el.catList;

    /* 상단 카테고리 색 범례(필터 아님 — 색 안내 + 관리 진입 역할) */
    function renderCategoryLegend() {

        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach((c) => {

        });

    /* 카테고리 변경 시 범례 + 관리 목록 동시 갱신 */
    function refreshCategoryUI() {
      renderCategoryLegend();
      renderCategoryList();
    }

    /* 카테고리 모달(추가/수정 공용) */
    let editingCategoryId = null;
    let selectedColor = PALETTE[0];

    function renderPalette(selected) {
      el.palette.innerHTML = "";
      PALETTE.forEach((color) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "swatch-btn";

    function openCategoryModal(id) {

    /* 카테고리 관리 모달(목록 + 추가 진입) */

    el.manageCatBtn.addEventListener("click", openManageModal);

    /* 카테고리 목록 상호작용 */
    el.catList.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn || btn.disabled) return;
      const row = e.target.closest(".cat-row");
      if (!row) return;
      const id = row.dataset.id;

    });

    /* 삭제: 소속 할 일 개수를 정확히 알리는 확인 단계 */
    function handleCategoryDelete(id) {
      if (state.categories.length <= 1) return; // 최소 1개 보장
      const cat = getCategory(id);
      const n = tasksInCategory(id).length;
      const msg =
        n > 0
          ? `'${cat.name}' 카테고리를 삭제하면 이 카테고리의 할 일 ${n}개가 함께 삭제됩니다. 계속할까요?`
          : `'${cat.name}' 카테고리를 삭제할까요?`;
      confirmDialog(msg).then((ok) => {
        if (ok) deleteCategory(id);
      });
    }

    /* ===== 삭제 확인 모달(Promise 기반) ===== */
    let confirmResolver = null;
    function confirmDialog(message) {
      el.confirmMessage.textContent = message;
      el.confirmModal.hidden = false;
      return new Promise((resolve) => { confirmResolver = resolve; });
    }
    function settleConfirm(value) {
      el.confirmModal.hidden = true;
      if (confirmResolver) { confirmResolver(value); confirmResolver = null; }
    }
    el.confirmOk.addEventListener("click", () => settleConfirm(true));
    el.confirmCancel.addEventListener("click", () => settleConfirm(false));
    el.confirmModal.addEventListener("click", (e) => {
      if (e.target === el.confirmModal) settleConfirm(false);
    });

    /* ===== '할 일' 그룹 헤더의 + 추가 → 모달 ===== */
    el.addTaskBtn.addEventListener("click", () => openTaskModal(null));

    /* ===== 카드 상호작용(이벤트 위임) ===== */
    el.board.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const cardEl = e.target.closest(".card");
      if (!cardEl) return;
      const id = cardEl.dataset.id;
      const action = btn.dataset.action;

      if (action === "edit") openTaskModal(id);
      else if (action === "delete") handleDelete(id);
    });

    el.board.addEventListener("change", (e) => {
      const input = e.target.closest("input[data-action]");
      if (!input) return;
      const cardEl = e.target.closest(".card");
      if (!cardEl) return;
      const id = cardEl.dataset.id;
      const action = input.dataset.action;

      if (action === "done") {
        // 완료가 우선: 켜면 done, 끄면 todo
        setStatus(id, input.checked ? "done" : "todo");
      } else if (action === "doing") {
        setStatus(id, input.checked ? "doing" : "todo");
      }
    });

    /* ===== 드래그 앤 드롭 (Pointer 이벤트, 마우스+터치) ===== */
    const DRAG_THRESHOLD = 6; // px: 이만큼 움직여야 드래그로 인정(클릭과 구분)
    let drag = null;

    el.board.addEventListener("pointerdown", (e) => {
      if (e.button != null && e.button !== 0) return;        // 주 버튼/터치만
      const card = e.target.closest(".card");
      if (!card) return;
      // 체크박스·토글·버튼 위에서 시작하면 드래그하지 않음(기존 동작 보존)
      if (e.target.closest("input, button, label")) return;

      drag = {
        id: card.dataset.id,
        card,
        pointerId: e.pointerId,
        startX: e.clientX,
        startY: e.clientY,
        started: false,
        placeholder: null,
        currentList: null,
        grabX: 0,
        grabY: 0,
      };
      // 캡처/리페어런팅에 의존하지 않도록 이동·종료는 window에서 처리한다.
      // (카드를 DOM에서 분리하면 pointer capture가 풀려 드래그가 멈추는 버그를 회피)
      window.addEventListener("pointermove", onDragMove);
      window.addEventListener("pointerup", onDragEnd);
      window.addEventListener("pointercancel", onDragEnd);
    });

    function startDrag(e) {
      const card = drag.card;
      const r = card.getBoundingClientRect();
      drag.grabX = e.clientX - r.left;
      drag.grabY = e.clientY - r.top;

      // 자리 표시 박스를 원래 위치(카드 앞)에 삽입
      const ph = document.createElement("div");
      ph.className = "drag-placeholder";
      ph.style.height = r.height + "px";
      drag.placeholder = ph;
      drag.currentList = card.parentElement;
      card.parentElement.insertBefore(ph, card);

      // 카드를 '제자리에서' 플로팅 처리(DOM 위치는 그대로 — 캡처 유실 방지)
      card.classList.add("dragging-card");
      card.style.width = r.width + "px";
      card.style.left = r.left + "px";
      card.style.top = r.top + "px";

      el.board.classList.add("dragging");
      drag.started = true;
    }

    function onDragMove(e) {
      if (!drag) return;
      if (!drag.started) {
        const dx = e.clientX - drag.startX;
        const dy = e.clientY - drag.startY;
        if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
        startDrag(e);
      }
      e.preventDefault();

      // 플로팅 카드 위치 갱신
      drag.card.style.left = e.clientX - drag.grabX + "px";
      drag.card.style.top = e.clientY - drag.grabY + "px";

      // 포인터 아래의 카드 목록 탐색(플로팅 카드는 pointer-events:none 이라 무시됨)
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const list = under && under.closest ? under.closest(".card-list") : null;
      if (list) {
        if (list !== drag.currentList) {
          if (drag.currentList) drag.currentList.classList.remove("drop-active");
          drag.currentList = list;
        }
        list.classList.add("drop-active");
        positionPlaceholder(list, e.clientY);
      }
    }

    /* 포인터 Y 위치에 맞춰 placeholder를 카드 사이/끝에 삽입(드래그 중 카드는 제외) */
    function positionPlaceholder(list, y) {
      const ph = drag.placeholder;
      const cards = [...list.children].filter(
        (c) => c.classList.contains("card") && c !== drag.card
      );
      let before = null;
      for (const c of cards) {
        const r = c.getBoundingClientRect();
        if (y < r.top + r.height / 2) { before = c; break; }
      }
      if (before) {
        if (ph.nextSibling !== before) list.insertBefore(ph, before);
      } else if (list.lastChild !== ph) {
        list.appendChild(ph);
      }
    }

    function onDragEnd(e) {
      if (!drag) return;
      const d = drag;
      drag = null;

      window.removeEventListener("pointermove", onDragMove);
      window.removeEventListener("pointerup", onDragEnd);
      window.removeEventListener("pointercancel", onDragEnd);

      if (!d.started) return; // 단순 탭/클릭 — 아무 변화 없음

      e.preventDefault();
      const list = d.placeholder.parentElement;
      commitDrag(d.id, list, d.placeholder);

      // 시각 정리(render()가 카드를 새로 그리므로 임시 노드만 정리)
      el.board.classList.remove("dragging");
      if (d.currentList) d.currentList.classList.remove("drop-active");
      d.placeholder.remove();
      // 플로팅 스타일 해제(render()가 곧 카드를 다시 그림)
      d.card.classList.remove("dragging-card");
      d.card.removeAttribute("style");
    }

    /* 놓인 칸의 DOM 순서대로 status/order를 확정하고 저장 */
    function commitDrag(draggedId, list, placeholder) {
      const targetStatus = list.parentElement.dataset.status;
      const dragged = state.tasks.find((t) => t.id === draggedId);
      if (!dragged) return;
      const prevStatus = dragged.status;

      // 타깃 칸의 새 순서(placeholder = 드래그된 카드 위치).
      // 드래그 중인 카드는 제자리에 남아 있으므로 id로 제외(중복 방지).
      const ids = [];
      [...list.children].forEach((node) => {
        if (node === placeholder) ids.push(draggedId);
        else if (node.classList.contains("card") && node.dataset.id !== draggedId) {
          ids.push(node.dataset.id);
        }
      });

      dragged.status = targetStatus;
      ids.forEach((id, i) => {
        const t = state.tasks.find((x) => x.id === id);
        if (t) { t.status = targetStatus; t.order = i; }
      });

      // 칸이 바뀌었으면 원래 칸의 남은 카드 순서 재정렬(빈틈 제거)
      if (prevStatus !== targetStatus) {
        state.tasks
          .filter((t) => t.date === dragged.date && t.status === prevStatus && t.id !== draggedId)
          .sort((a, b) => a.order - b.order)
          .forEach((t, i) => { t.order = i; });
      }

      dragged.updatedAt = nowISO();
      save();
      render();
    }

    /* ===== 삭제 + 되돌리기 토스트 ===== */
    let undoTimer = null;
    function handleDelete(id) {
      const removed = deleteTask(id);
      if (!removed) return;
      showUndoToast(removed);
    }

    function showUndoToast(task) {
      clearTimeout(undoTimer);
      el.toastMsg.textContent = `'${task.title}' 삭제됨`;
      el.toast.hidden = false;
      const onUndo = () => {
        clearTimeout(undoTimer);
        el.toast.hidden = true;
        el.toastUndo.removeEventListener("click", onUndo);
        restoreTask(task);
      };
      el.toastUndo.addEventListener("click", onUndo);
      undoTimer = setTimeout(() => {
        el.toast.hidden = true;
        el.toastUndo.removeEventListener("click", onUndo);
      }, 5000);
    }

    /* ===== 할 일 추가/수정 모달(공용) ===== */
    let editingTaskId = null; // null이면 추가 모드

    function openTaskModal(id) {
      editingTaskId = id || null;
      if (id) {
        const t = state.tasks.find((x) => x.id === id);
        if (!t) return;
        el.editHeading.textContent = "할 일 수정";
        el.editTitle.value = t.title;
        el.editMemo.value = t.memo || "";
        el.editDate.value = t.date;
        fillCategoryOptions(el.editCategory, t.categoryId);
      } else {
        // 추가: 기본 카테고리=첫 항목, 날짜=현재 selectedDate
        el.editHeading.textContent = "할 일 추가";
        el.editTitle.value = "";
        el.editMemo.value = "";
        el.editDate.value = state.selectedDate;
        fillCategoryOptions(el.editCategory, state.categories[0] && state.categories[0].id);
      }
      el.editTitle.classList.remove("invalid");
      el.editModal.hidden = false;
      el.editTitle.focus();
    }
    function closeTaskModal() {
      el.editModal.hidden = true;
      editingTaskId = null;
    }
    el.editForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = el.editTitle.value.trim();
      if (!title) {
        el.editTitle.classList.add("invalid");
        el.editTitle.focus();
        return;
      }
      el.editTitle.classList.remove("invalid");
      const payload = {
        title,
        memo: el.editMemo.value,
        categoryId: el.editCategory.value || (state.categories[0] && state.categories[0].id),
        date: el.editDate.value || state.selectedDate,
      };
      if (editingTaskId) updateTask(editingTaskId, payload);
      else addTask(payload); // status='todo'로 '할 일' 최하단에 추가
      closeTaskModal();
    });
    el.editCancel.addEventListener("click", closeTaskModal);
    el.editModal.addEventListener("click", (e) => {
      if (e.target === el.editModal) closeTaskModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (!el.confirmModal.hidden) settleConfirm(false);
      else if (!el.categoryModal.hidden) closeCategoryModal();
      else if (!el.manageModal.hidden) closeManageModal();
      else if (!el.editModal.hidden) closeTaskModal();
      else if (!el.searchResults.hidden) closeSearch();
    });

    /* ===== 달력 ===== */

    /* Date -> 'YYYY-MM-DD'(로컬) */
    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    /* 'YYYY-MM-DD' -> { year, month(0-11) } */
    function monthOf(dateStr) {
      const [y, m] = dateStr.split("-").map(Number);
      return { year: y, month: m - 1 };
    }
    function addMonth(view, delta) {
      const d = new Date(view.year, view.month + delta, 1);
      return { year: d.getFullYear(), month: d.getMonth() };
    }

    let calView = monthOf(state.selectedDate);

    function renderCalendar() {
      const { year, month } = calView;
      el.calTitle.textContent = `${year}년 ${month + 1}월`;

      // 날짜별 할 일 개수
      const counts = {};
      state.tasks.forEach((t) => { counts[t.date] = (counts[t.date] || 0) + 1; });

      const today = todayStr();
      const startDow = new Date(year, month, 1).getDay(); // 0=일
      const start = new Date(year, month, 1 - startDow);  // 첫 칸(이전 달 spillover 포함)

      el.calGrid.innerHTML = "";
      for (let i = 0; i < 42; i++) {
        const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
        const ds = fmtDate(d);
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "cal-cell";
        if (d.getMonth() !== month) cell.classList.add("muted");
        if (ds === today) cell.classList.add("today");
        if (ds === state.selectedDate) cell.classList.add("selected");
        cell.dataset.date = ds;
        if (ds === state.selectedDate) cell.setAttribute("aria-current", "date");
        cell.textContent = d.getDate();
        if (counts[ds]) {
          const dot = document.createElement("span");
          dot.className = "cal-dot";
          dot.title = `할 일 ${counts[ds]}개`;
          cell.appendChild(dot);
        }
        el.calGrid.appendChild(cell);
      }
    }

    /* selectedDate 변경: 보드·달력을 함께 전환(추가 모달은 열 때 selectedDate 사용) */
    function setSelectedDate(date) {
      state.selectedDate = date;
      save();
      calView = monthOf(date);
      render();
    }

    el.calGrid.addEventListener("click", (e) => {
      const cell = e.target.closest(".cal-cell");
      if (!cell) return;
      setSelectedDate(cell.dataset.date);
    });
    el.calPrev.addEventListener("click", () => { calView = addMonth(calView, -1); renderCalendar(); });
    el.calNext.addEventListener("click", () => { calView = addMonth(calView, 1); renderCalendar(); });

    /* ===== 전체 검색 ===== */

    function searchActive() {
      return el.searchInput && el.searchInput.value.trim() !== "";
    }
    function closeSearch() {
      el.searchResults.hidden = true;
      el.searchResults.innerHTML = "";
    }

    function renderSearch(raw) {
      const q = (raw || "").trim().toLowerCase();
      if (!q) { closeSearch(); return; }

      const matches = state.tasks
        .filter(
          (t) =>
            (t.title || "").toLowerCase().includes(q) ||
            (t.memo || "").toLowerCase().includes(q)
        )
        .sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : a.order - b.order));

      el.searchResults.innerHTML = "";
      if (matches.length === 0) {
        const em = document.createElement("div");
        em.className = "search-empty";
        em.textContent = `'${raw.trim()}'에 일치하는 할 일이 없습니다`;
        el.searchResults.appendChild(em);
      } else {
        matches.forEach((t) => {
          const cat = getCategory(t.categoryId);
          const item = document.createElement("button");
          item.type = "button";
          item.className = "sr-item";
          item.setAttribute("role", "option");
          item.dataset.date = t.date;

          const title = document.createElement("div");
          title.className = "sr-title" + (t.status === "done" ? " done" : "");
          title.textContent = t.title;
          item.appendChild(title);

          const meta = document.createElement("div");
          meta.className = "sr-meta";
          if (cat) {
            const chip = document.createElement("span");
            chip.className = "cat-chip";
            chip.textContent = cat.name;
            chip.style.background = cat.color;
            meta.appendChild(chip);
          }
          const st = document.createElement("span");
          st.className = "sr-status";
          st.textContent = STATUS_LABEL[t.status];
          meta.appendChild(st);

          const dt = document.createElement("span");
          dt.className = "sr-date";
          dt.textContent = t.date;
          meta.appendChild(dt);

          item.appendChild(meta);
          el.searchResults.appendChild(item);
        });
      }
      el.searchResults.hidden = false;
    }

    el.searchInput.addEventListener("input", () => renderSearch(el.searchInput.value));
    el.searchInput.addEventListener("focus", () => {
      if (searchActive()) renderSearch(el.searchInput.value);
    });
    el.searchResults.addEventListener("click", (e) => {
      const item = e.target.closest(".sr-item");
      if (!item) return;
      setSelectedDate(item.dataset.date);
      el.searchInput.value = "";
      closeSearch();
    });
    // 바깥 클릭 시 결과 닫기
    document.addEventListener("click", (e) => {
      if (!el.searchResults.hidden && !e.target.closest(".search-wrap")) closeSearch();
    });

    /* 첫 렌더 */
    refreshCategoryUI();   // 범례 + 관리 목록
    render();

    // 디버깅/다음 단계 연동을 위해 노출
    window.TodoApp = {
      STORAGE_KEY, uid, load, save, render,
      addTask, updateTask, deleteTask, setStatus,
      addCategory, updateCategory, deleteCategory, tasksInCategory,
      get state() { return state; },
    };
  </script>
</body>
</html>
